<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Dram Master - Հայկական Իմպերիա</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); color: white; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { padding: 15px; max-width: 450px; margin: auto; padding-bottom: 80px; }
        
        .screen { display: none; text-align: center; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(26,26,26,0.8); padding: 10px 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 1px solid #ffcc00; color: #ffcc00; }
        .passive-info { font-size: 11px; color: #aaa; text-align: right; }
        .passive-inc { font-weight: bold; color: #ff9900; }

        /* STATS BOX */
        .stats-box { background: rgba(26,26,26,0.6); border: 1px solid #444; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .balance-title { font-size: 13px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .balance-text { font-size: 36px; color: #00ff88; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 1px; }
        .dram-symbol { color: #ffcc00; font-size: 30px; }
        .level-bar-container { background: #333; height: 6px; border-radius: 10px; margin: 15px 0 5px 0; overflow: hidden; position: relative; }
        .level-bar-fill { background: linear-gradient(90deg, #ffcc00, #ff9900); height: 100%; width: 0%; transition: width 0.3s; }
        .level-info { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; }
        .status-badge { background: #ffcc00; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        /* TAPPABLE AREA */
        .tap-area { display: flex; justify-content: center; align-items: center; margin: 25px 0; position: relative; }
        .tap-coin { width: 220px; height: 220px; background: linear-gradient(135deg, #ffcc00 0%, #cc9900 100%); border-radius: 50%; box-shadow: 0 0 50px rgba(255, 204, 0, 0.4), inset 0 0 20px rgba(0,0,0,0.5); border: 10px solid #cc9900; transition: transform 0.1s ease; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; color: rgba(255,255,255,0.8); text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .tap-coin:active { transform: scale(0.96); }
        
        /* FOOTER NAV */
        .footer-nav { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(26,26,26,0.9); border-radius: 20px; border: 1px solid #333; display: flex; justify-content: space-around; padding: 10px; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(10px); }
        .nav-btn { background: transparent; border: none; color: #888; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-family: 'Montserrat', sans-serif; }
        .nav-btn.active-nav { color: #ffcc00; font-weight: bold; }
        .nav-icon { font-size: 20px; }

        /* LISTS */
        .list-header { text-align: left; margin: 15px 0 10px 5px; font-size: 18px; color: #fff; font-weight: bold; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; gap: 10px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #ffcc00; border-radius: 4px; }
        .card-info { text-align: left; flex: 1; }
        .card h4 { margin: 0; font-size: 16px; color: #fff; }
        .card p { margin: 4px 0 0; font-size: 11px; color: #aaa; }
        .buy-info { display: flex; align-items: center; gap: 4px; font-weight: bold; color: #00ff88; font-size: 13px; }
        .buy-btn { background: #2a2a2a; color: #ffcc00; border: 1px solid #ffcc00; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
        .buy-btn:active { background: #ffcc00; color: #000; }
        .owned-badge { font-size: 11px; color: #aaa; margin-top: 5px; }

        /* WELCOME & FORMS */
        input { width: 90%; padding: 18px; border-radius: 15px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 18px; margin-bottom: 25px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.2); }
        .main-btn { width: 100%; padding: 22px; font-size: 22px; border: none; border-radius: 18px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .work-btn { background: linear-gradient(45deg, #ff9900, #cc7a00); color: white; box-shadow: 0 6px 0 #995c00; }
        .work-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #995c00; }

    </style>
</head>

                <h4>Բաժանորդագրվիր իմ ալիքին</h4>
                <p>Ստացիր բոնուս</p>
            </div>
            <div style="text-align: right;">
                <div class="buy-info">+10,000 ֏</div>

            </div>
        </div>
        <div id="tasks-completed" style="color: #aaa; font-size: 13px; margin-top: 20px;"></div>

        }

        function buyItem(type, id) {
            const item = items[type].find(i => i.id === id);
            if (state.bal >= item.p && !state.inventory[id]) {
                state.bal -= item.p;
                state.inc += item.inc;
                state.inventory[id] = 1; // Յուրաքանչյուր իրից 1 հատ
                tg.HapticFeedback.notificationOccurred('success');
                showShopTab(type);
                updateUI();
                save();
            }
        }

        // ԳՈՎԱԶԴ և BOOSTS
        async function watchAd(type) {
            if (!AdController) {
                tg.showAlert("Գովազդը դեռ բեռնված չէ: Խնդրում ենք սպասել կամ ստուգել ինտերնետը:");
                return;
            }
            try {
                await AdController.show();
                state.adCount[type]++;
                
                if (type === 'energy' && state.adCount.energy >= 2) {
                    let maxE = levels.find(l => l.l === state.lvl).maxE;
                    state.energy = maxE;
                    state.adCount.energy = 0;
                    tg.showAlert("⚡ Էներգիան լիցքավորված է 100%!");
                } else if (type === '2x' && state.adCount.x2 >= 3) {
                    state.x2Until = Date.now() + (5 * 60 * 1000);
                    state.adCount.x2 = 0;
                    tg.showAlert("🔥 2X Բոնուսը ակտիվ է 5 րոպեով!");
                } else if (type === '3x' && state.adCount.x3 >= 4) {
                    state.x3Until = Date.now() + (5 * 60 * 1000);
                    state.x3Next = Date.now() + (3 * 24 * 60 * 60 * 1000); // 3 օր
                    state.adCount.x3 = 0;
                    tg.showAlert("🚀 3X ՍՈՒՊԵՐ Բոնուսը ակտիվ է!");
                }
                save(); updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                tg.showAlert("Գովազդը փակվել է կամ սխալ է տեղի ունեցել:");
            }
        }

        // Friends Referral
        function claimFriendsBonus() {
            // Ստուգում ենք բոնուսը (Python-ի backend-ը պետք է թարմացնի friendCount-ը)
            if (state.bonusClaimed) {
                tg.showAlert("Դուք արդեն ստացել եք այս բոնուսը:");
                return;
            }
            // Backend-ից ստանում ենք իրական friendCount-ը
            // Այս պահին մենք ստուգում ենք client-side, բայց պրոֆեսիոնալ ձևըBackend-ով է
            if (state.friendCount >= 10) {
                state.bal += 50000;
                state.bonusClaimed = true;
                tg.showAlert("🎉 Շնորհավոր! Դուք ստացաք +50,000 ֏ բոնուս:");
                tg.HapticFeedback.notificationOccurred('success');
                save(); updateUI();
            } else {
                tg.showAlert(`Ձեզ պետք է ևս ${10 - state.friendCount} ընկեր՝ բոնուսը ստանալու համար:`);
                // Ցույց տալ ռեֆերալ հղումը
                const userId = tg.initDataUnsafe.user.id;
                tg.showAlert(`Քո հղումը՝ https://t.me/Քո_Բոտի_Անունը?start=${userId}`);
            }
        }

        // --- ՕԳՏԱԿԱՐ ՖՈՒՆԿՑԻԱՆԵՐ ---
        function formatTime(ms) {
            let m = Math.floor(ms / 60000).toString().padStart(2, '0');
            let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function nav(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if (id === 'shop-screen') showShopTab(currentShopTab);
            tg.HapticFeedback.selectionChanged();
        }

        // Պասիվ շահույթ և Էներգիա (0.1 վայրկյանը մեկ)
        setInterval(() => {
            state.bal += (state.inc / 10);
            
            let currentLvlData = levels.find(l => l.l === state.lvl);
            let maxE = currentLvlData.maxE;
            if (state.energy < maxE) {
                state.energy = Math.min(maxE, state.energy + (maxE / 3000)); // ~5 րոպեում 100% լցվում է
            }
            updateUI();
        }, 100);

        function save() {
            state.lastSave = Date.now();
            localStorage.setItem('dramMasterProState', JSON.stringify(state)); 
        }
        function load() {
            const saved = localStorage.getItem('dramMasterProState');
            if (saved) {
                let loaded = JSON.parse(saved);
                state = {...state, ...loaded};
                
                // Օֆլայն շահույթ
                let now = Date.now();
                let passedSec = (now - state.lastSave) / 1000;
                if (passedSec > 0) {
                    state.bal += (state.inc * passedSec);
                    // Էներգիա
                    let currentLvlData = levels.find(l => l.l === state.lvl);
                    state.energy = Math.min(currentLvlData.maxE, state.energy + (currentLvlData.maxE / 3000 * passedSec * 10));
                }
            }
            updateUI();
        }

        load();
        setInterval(save, 5000); // Save every 5 sec
    </script>
</body>
</html>

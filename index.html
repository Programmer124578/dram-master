<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro | Ultimate Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --bg: #050505;
            --card-bg: #111111;
            --mint: #00FA9A;
            --text: #ffffff;
            --text-gray: #aaaaaa;
            --error: #FF4500;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header & Stats */
        .header {
            padding: 15px;
            background: linear-gradient(180deg, #181818 0%, var(--bg) 100%);
            border-bottom: 2px solid var(--gold);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        .balance-val {
            font-size: 38px; font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .stats-info {
            display: flex; justify-content: space-around;
            font-size: 13px; color: var(--text-gray); margin-top: 5px;
        }

        .level-bar-container {
            width: 100%; height: 22px;
            background-color: #222;
            border-radius: 11px;
            margin-top: 12px;
            position: relative;
            border: 1px solid #333;
            overflow: hidden;
        }

        .level-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark) 0%, var(--gold) 100%);
            width: 0%;
            transition: width 0.4s ease-out;
        }

        .level-bar-text {
            position: absolute; width: 100%; top: 0; left: 0;
            line-height: 22px; font-size: 11px; font-weight: bold; color: white;
            text-shadow: 1px 1px 2px black;
            text-align: center;
        }

        /* Screens */
        .screen { display: none; padding: 20px; padding-bottom: 120px; height: calc(100vh - 160px); overflow-y: auto; box-sizing: border-box; }
        .screen.active { display: block; }

        /* Game Area */
        .coin-area {
            height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .main-coin {
            width: 240px; height: 240px;
            background: radial-gradient(circle, #ffe066 0%, #b8860b 70%, #8b6914 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 10px solid #5e4a06;
            box-shadow: 0 0 40px rgba(184, 134, 11, 0.5);
            cursor: pointer; transition: transform 0.05s;
            z-index: 5;
        }

        .main-coin:active { transform: scale(0.92); }
        .coin-symbol { font-size: 100px; color: #5e4a06; font-weight: bold; pointer-events: none; }

        .float-text {
            position: absolute; pointer-events: none;
            color: #ffffff; font-weight: 900; font-size: 34px;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--gold);
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-140px) scale(1.2); }
        }

        /* Shop Tabs */
        .tab-menu { display: flex; gap: 8px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); padding: 5px 0; z-index: 20; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; }

        /* Item Cards */
        .item-card {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; margin-bottom: 12px;
        }

        .item-info b { color: var(--gold); font-size: 16px; display: block; }
        .item-info small { color: var(--text-gray); font-size: 12px; }

        .buy-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: black; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .buy-btn:disabled { background: #444 !important; color: #777 !important; cursor: default; }

        /* Daily Rewards Grid */
        .daily-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .day-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px; text-align: center; font-size: 11px; }
        .day-box.active { border-color: var(--mint); background: rgba(0,250,154,0.1); }
        .day-box.done { border-color: var(--gold); color: var(--gold); }

        /* Navigation Bar */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #111; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 2px solid #333; z-index: 100;
        }

        .nav-item { background: none; border: none; color: #666; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .nav-icon { font-size: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-val" id="bal">0 ֏</div>
        <div class="stats-info">
            <span id="inc">0/վ</span>
            <span id="energy">⚡ 500/500</span>
        </div>
        <div class="level-bar-container">
            <div class="level-bar-fill" id="lvl-bar-fill"></div>
            <div class="level-bar-text" id="lvl-bar-text">Լևլ 1 | Սկսնակ (0%)</div>
        </div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-area">
            <div class="main-coin" id="mainCoinBtn">
                <div class="coin-symbol">֏</div>
            </div>
            <p id="boost-timer" style="color:var(--mint); font-weight:bold; margin-top:20px; display:none;"></p>
        </div>
    </div>

    <div id="shop" class="screen">
        <div class="tab-menu">
            <button class="tab-btn active" id="tab-house">🏠 Գույք</button>
            <button class="tab-btn" id="tab-car">🚗 Մեքենա</button>
            <button class="tab-btn" id="tab-biz">🏢 Բիզնես</button>
        </div>
        <div id="shop-list"></div>
    </div>

    <div id="tasks" class="screen">
        <h3 style="color:var(--gold);">📅 Ամենօրյա Պարգև (7 օր)</h3>
        <div class="daily-grid" id="daily-container"></div>
        <button class="buy-btn" id="claim-btn" style="width:100%; margin-bottom:25px;">Ստանալ Պարգևը</button>

        <h3 style="color:var(--gold);">🚀 Գովազդային Բոնուսներ</h3>
        <div class="item-card">
            <div class="item-info"><b>🔥 2X Շահույթ (5ր)</b><small>Դիտիր 3 գովազդ</small></div>
            <button class="buy-btn" id="ad-x2-btn">Դիտել</button>
        </div>
        <div class="item-card">
            <div class="item-info"><b>⚡ Էներգիա</b><small>Դիտիր 2 գովազդ = 100%</small></div>
            <button class="buy-btn" id="ad-energy-btn" style="background:var(--mint);">Դիտել</button>
        </div>
        <div class="item-card">
            <div class="item-info"><b>💰 Արագ Կանխիկ</b><small>1 գովազդ = +10,000 ֏</small></div>
            <button class="buy-btn" id="ad-money-btn">Դիտել</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" id="nav-game"><span class="nav-icon">🪙</span>Խաղալ</button>
        <button class="nav-item" id="nav-shop"><span class="nav-icon">🛒</span>Խանութ</button>
        <button class="nav-item" id="nav-tasks"><span class="nav-icon">🎁</span>Պարգևներ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ADSGRAM INITIALIZATION (dd66-ը տեստային է, 26025-ը քոնն է)
        // Երբ քոնը ակտիվանա, dd66-ը փոխիր 26025-ով
        const adsgram = window.Adsgram.init({ blockId: "dd66" }); 
        let lastInterstitial = 0;

        let state = {
            bal: 0, inc: 0, energy: 500, maxE: 500, lvl: 1,
            streak: 0, lastDaily: 0,
            x2Ads: 0, x2Time: 0, energyAds: 0,
            lastSave: Date.now()
        };

        const config = {
            levels: [
                {l:1, n:"Սկսնակ", m:0, e:500, k:1},
                {l:2, n:"Փորձնակ", m:20000, e:1000, k:2},
                {l:3, n:"Աշխատավոր", m:100000, e:1500, k:4},
                {l:4, n:"Վաճառական", m:500000, e:2000, k:8},
                {l:5, n:"Գործարար", m:2000000, e:3000, k:15},
                {l:6, n:"Միլիոնատեր", m:10000000, e:5000, k:30},
                {l:7, n:"Օլիգարխ", m:50000000, e:8000, k:70},
                {l:8, n:"Տիրակալ", m:250000000, e:12000, k:150}
            ],
            items: {
                house: [
                    {n:'Սենյակ', p:1000, i:2}, {n:'Բնակարան', p:5000, i:12}, {n:'Գյուղական տուն', p:20000, i:55},
                    {n:'Առանձնատուն', p:80000, i:220}, {n:'Դուպլեքս', p:250000, i:700}, {n:'Վիլլա Դիլիջանում', p:600000, i:1800},
                    {n:'Modern House', p:1500000, i:4500}, {n:'Smart Home', p:4000000, i:13000}, {n:'Ocean Villa', p:10000000, i:35000},
                    {n:'Պենտհաուս', p:25000000, i:90000}, {n:'Ամրոց', p:70000000, i:250000}, {n:'Կղզի', p:180000000, i:700000},
                    {n:'Սեփական Թաղամաս', p:450000000, i:1800000}, {n:'Պալատ', p:1000000000, i:4500000}, {n:'Քաղաք', p:3000000000, i:15000000}
                ],
                car: [
                    {n:'Հեծանիվ', p:500, i:1}, {n:'VAZ 2107', p:3000, i:8}, {n:'Opel Astra', p:10000, i:30},
                    {n:'Toyota Camry', p:40000, i:120}, {n:'Mercedes C', p:120000, i:400}, {n:'Tesla 3', p:300000, i:1100},
                    {n:'BMW M5', p:800000, i:3200}, {n:'Porsche 911', p:2000000, i:9000}, {n:'Lambo', p:6000000, i:28000},
                    {n:'Rolls Royce', p:15000000, i:75000}, {n:'Ferrari', p:40000000, i:220000}, {n:'Bugatti', p:100000000, i:600000},
                    {n:'Ուղղաթիռ', p:300000000, i:2000000}, {n:'Jet', p:800000000, i:6000000}, {n:'Rocket', p:2500000000, i:20000000}
                ],
                biz: [
                    {n:'Կրպակ', p:2500, i:6}, {n:'Ավտոլվացում', p:12000, i:35}, {n:'Սրճարան', p:45000, i:140},
                    {n:'Սրահ', p:150000, i:500}, {n:'Մարզասրահ', p:400000, i:1500}, {n:'Ավտոսերվիս', p:1000000, i:4000},
                    {n:'Ռեստորան', p:3000000, i:13000}, {n:'Շինարարություն', p:8000000, i:38000}, {n:'IT Բիզնես', p:20000000, i:100000},
                    {n:'Բանկ', p:50000000, i:280000}, {n:'Գործարան', p:120000000, i:750000}, {n:'Կորպորացիա', p:350000000, i:2200000},
                    {n:'Հանքեր', p:900000000, i:6500000}, {n:'Էներգոցանց', p:2000000000, i:16000000}, {n:'Կայսրություն', p:5000000000, i:45000000}
                ]
            }
        };

        // --- CORE FUNCTIONS ---
        function updateUI() {
            const cl = config.levels.findLast(x => state.bal >= x.m) || config.levels[0];
            state.lvl = cl.l; state.maxE = cl.e;

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + '/վ';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;

            let next = config.levels[cl.l];
            let prog = next ? ((state.bal - cl.m) / (next.m - cl.m)) * 100 : 100;
            document.getElementById('lvl-bar-fill').style.width = Math.min(prog, 100) + '%';
            document.getElementById('lvl-bar-text').innerText = `Լևլ ${cl.l} | ${cl.n} (${Math.floor(prog)}%)`;

            let boost = document.getElementById('boost-timer');
            if(Date.now() < state.x2Time) {
                boost.innerText = "🔥 2X ՇԱՀՈՒՅԹԸ ԱԿՏԻՎ Է"; boost.style.display = 'block';
            } else { boost.style.display = 'none'; }
        }

        function clickCoin(e) {
            if(state.energy < 1) { tg.HapticFeedback.notificationOccurred('warning'); return; }
            state.energy--;
            
            let m = (Date.now() < state.x2Time) ? 2 : 1;
            let earn = config.levels[state.lvl-1].k * m;
            state.bal += earn;

            const f = document.createElement('div');
            f.className = 'float-text';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            f.innerText = `+${earn}`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
            
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        // --- ADS LOGIC ---
        async function showAdsgram(type) {
            adsgram.show().then(() => {
                if(type === 'x2') {
                    state.x2Ads++;
                    if(state.x2Ads >= 3) { state.x2Time = Date.now() + 300000; state.x2Ads = 0; tg.showAlert("2X Շահույթը ակտիվացավ 5 րոպեով!"); }
                    else tg.showAlert(`Մնաց դիտել ${3-state.x2Ads} գովազդ:`);
                } else if(type === 'energy') {
                    state.energyAds++;
                    if(state.energyAds >= 2) { state.energy = state.maxE; state.energyAds = 0; tg.showAlert("Էներգիան լիցքավորվեց!"); }
                    else tg.showAlert("Մնաց դիտել 1 գովազդ:");
                } else if(type === 'money') {
                    state.bal += 10000; tg.showAlert("Դուք ստացաք +10,000 ֏!");
                }
                save(); updateUI();
            }).catch((e) => {
                tg.showAlert("Գովազդը բեռնելու սխալ: Ստուգեք կապը:");
            });
        }

        async function checkInterstitial() {
            if(Date.now() - lastInterstitial > 60000) {
                adsgram.show().then(() => { lastInterstitial = Date.now(); }).catch(() => {});
            }
        }

        // --- NAVIGATION & SHOP ---
        function openNav(s, btn) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            btn.classList.add('active');
            
            checkInterstitial();
            if(s === 'shop') renderShop('house');
            if(s === 'tasks') renderDaily();
        }

        function renderShop(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(type === 'house') document.getElementById('tab-house').classList.add('active');
            if(type === 'car') document.getElementById('tab-car').classList.add('active');
            if(type === 'biz') document.getElementById('tab-biz').classList.add('active');

            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            config.items[type].forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-info"><b>${item.n}</b><small>${item.p.toLocaleString()} ֏ | +${item.i}/վ</small></div>
                    <button class="buy-btn" onclick="buyItem('${type}', ${idx})" ${state.bal < item.p ? 'disabled':''}>Գնել</button>
                `;
                list.appendChild(card);
            });
        }

        window.buyItem = function(type, idx) {
            let item = config.items[type][idx];
            if(state.bal >= item.p) {
                state.bal -= item.p; state.inc += item.i;
                tg.HapticFeedback.notificationOccurred('success');
                renderShop(type); updateUI(); save();
            }
        }

        // --- DAILY REWARDS ---
        function renderDaily() {
            const cont = document.getElementById('daily-container');
            cont.innerHTML = '';
            for(let i=1; i<=7; i++) {
                const box = document.createElement('div');
                box.className = `day-box ${i <= state.streak ? 'done' : (i === state.streak + 1 ? 'active' : '')}`;
                box.innerText = `Օր ${i}`;
                cont.appendChild(box);
            }
            let canClaim = (new Date().toDateString() !== new Date(state.lastDaily).toDateString());
            document.getElementById('claim-btn').disabled = !canClaim;
        }

        document.getElementById('claim-btn').onclick = () => {
            state.bal += (state.streak + 1) * 5000;
            state.lastDaily = Date.now();
            state.streak = (state.streak + 1) % 7;
            renderDaily(); updateUI(); save();
            tg.showAlert("Պարգևը ստացված է:");
        };

        // --- INITIALIZATION ---
        document.getElementById('mainCoinBtn').onclick = (e) => clickCoin(e);
        document.getElementById('nav-game').onclick = function() { openNav('game', this); };
        document.getElementById('nav-shop').onclick = function() { openNav('shop', this); };
        document.getElementById('nav-tasks').onclick = function() { openNav('tasks', this); };
        
        document.getElementById('tab-house').onclick = () => renderShop('house');
        document.getElementById('tab-car').onclick = () => renderShop('car');
        document.getElementById('tab-biz').onclick = () => renderShop('biz');

        document.getElementById('ad-x2-btn').onclick = () => showAdsgram('x2');
        document.getElementById('ad-energy-btn').onclick = () => showAdsgram('energy');
        document.getElementById('ad-money-btn').onclick = () => showAdsgram('money');

        function save() { state.lastSave = Date.now(); localStorage.setItem('dm_pro_save_v3', JSON.stringify(state)); }
        function load() {
            let s = localStorage.getItem('dm_pro_save_v3');
            if(s) {
                state = JSON.parse(s);
                let off = (Date.now() - state.lastSave) / 1000;
                state.bal += state.inc * off;
            }
            updateUI();
        }

        setInterval(() => {
            state.bal += state.inc / 10;
            if(state.energy < state.maxE) state.energy += 0.2;
            updateUI();
        }, 100);

        load();
        setInterval(save, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .score-container {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #fbbf24, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
            border: 8px solid #f59e0b;
        }
        .coin:active {
            transform: scale(0.95);
        }
        .disclaimer {
            margin-top: 30px;
            font-size: 10px;
            color: #94a3b8;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="score-container">
        ֏ <span id="balance">0</span>
    </div>

    <div class="coin" id="clicker">
        ֏
    </div>

    <div class="disclaimer">
        * Խաղի մեջ հավաքված գումարները վիրտուալ են և չունեն իրական դրամական արժեք:
    </div>

    <script>
        let balance = 0;
        const balanceDisplay = document.getElementById('balance');
        const clicker = document.getElementById('clicker');

        clicker.addEventListener('click', (e) => {
            balance++;
            balanceDisplay.innerText = balance;

            // Ստեղծում ենք թռչող տեքստ "+1"
            const x = e.clientX;
            const y = e.clientY;
            const plus = document.createElement('div');
            plus.innerText = '+1';
            plus.style.position = 'absolute';
            plus.style.left = x + 'px';
            plus.style.top = y + 'px';
            plus.style.color = '#4ade80';
            plus.style.fontWeight = 'bold';
            plus.style.pointerEvents = 'none';
            plus.style.animation = 'flyUp 0.5s ease-out forwards';
            document.body.appendChild(plus);

            setTimeout(() => plus.remove(), 500);
        });

        // Անիմացիայի ոճը
        const style = document.createElement('style');
        style.innerHTML = `@keyframes flyUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }`;
        document.head.appendChild(style);
    </script>
</body>
</html>

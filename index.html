        .modal-title { color: var(--gold); font-size: 22px; font-weight: 900; margin-bottom: 10px; }

        .modal-btn { background: linear-gradient(135deg, var(--gold), #ff8c00); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 14px; width: 100%; cursor: pointer; margin-bottom: 10px; }

        .header { padding: 15px; background: rgba(10, 11, 16, 0.9); backdrop-filter: blur(15px); text-align: center; border-bottom: 1px solid rgba(255,215,0,0.15); position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        .lvl-cont { width: 100%; height: 26px; background: rgba(0,0,0,0.8); border-radius: 13px; margin: 0 auto 15px; position: relative; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .lvl-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #b8860b, #ffd700, #ff8c00); width: 0%; transition: width 0.3s ease; }
        .lvl-txt { position: relative; z-index: 10; font-size: 12px; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        .balance-val { font-size: 42px; font-weight: 900; color: var(--gold); text-shadow: 0 4px 15px rgba(255,215,0,0.4); margin: 5px 0; }
        .stats { display: flex; justify-content: space-between; font-size: 13px; color: #a0a0a0; font-weight: 700; padding: 0 5px; }
        
        .screen { display: none; padding: 20px 15px 95px; height: calc(100vh - 180px); overflow-y: auto; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .coin-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-coin { width: 250px; height: 250px; background: radial-gradient(circle at 30% 30%, #fff9c4, #ffd700, #996515); border-radius: 50%; border: 8px solid #6b4c0a; display: flex; align-items: center; justify-content: center; font-size: 110px; color: #4a3600; cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transition: transform 0.05s; touch-action: manipulation; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg-dark); padding: 10px 0; z-index: 500; }
        .tab-btn { flex: 1; padding: 14px 5px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); color: #aaa; border-radius: 14px; font-size: 12px; font-weight: 800; }
        .tab-btn.active { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }

        .card { background: rgba(25, 27, 38, 0.7); backdrop-filter: blur(10px); border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }

    </style>
</head>

            if(state.lang === 'en') state.lang = 'hy';
            else if(state.lang === 'hy') state.lang = 'ru';
            else state.lang = 'en';
            applyLang(); save(); setTab('house'); 
        }

        function updateTasksUI() {
            let t = dict[state.lang];
            let now = Date.now();
            ['r1k', 'r5k', 'mystery', 'doubleBal', 'x2c', 'x3c'].forEach(type => {
                let req = AD_REQS[type];
                let count = state.adCounts[type] || 0;
                let btn = document.getElementById('btn-' + type);
                if (btn) {
                    if ((type === 'x2c' || type === 'x3c') && state.multExpiry > now) {
                        let diff = Math.ceil((state.multExpiry - now) / 1000);
                        btn.innerText = `${t.btnBought} (${diff}վ)`; btn.disabled = true; btn.className = "buy-btn bought";
                    } else {
                        btn.innerText = `${t.watch} (${count}/${req})`; btn.disabled = false; btn.className = "buy-btn";
                    }
                }
            });
        }

        function applyLang() {
            let t = dict[state.lang];
            let flag = { hy: '🇦🇲 HY', en: '🇬🇧 EN', ru: '🇷🇺 RU' };
            document.getElementById('lang-btn').innerText = flag[state.lang];
            
            document.getElementById('btn-house').innerText = t.h;
            document.getElementById('btn-car').innerText = t.c;
            document.getElementById('btn-biz').innerText = t.b;
            document.getElementById('n-game').innerText = t.nGame;
            document.getElementById('n-shop').innerText = t.nShop;
            document.getElementById('n-tasks').innerText = t.nTasks;
            
            document.getElementById('t-social').innerText = t.tsoc;
            document.getElementById('t-news').innerText = t.tnews;
            document.getElementById('t-invite').innerText = t.tinv;
            document.getElementById('t-ads-section').innerText = t.tads;
            
            document.getElementById('t-r1k').innerText = t.tr1k;
            document.getElementById('t-r5k').innerText = t.tr5k;
            document.getElementById('t-mystery').innerText = t.tmystery;
            document.getElementById('t-double').innerText = t.tdouble;
            document.getElementById('t-x2c').innerText = t.tx2c;
            document.getElementById('t-x3c').innerText = t.tx3c;
            
            document.getElementById('s-x2c').innerText = t.min5;
            document.getElementById('s-x3c').innerText = t.min5;
            
            document.getElementById('btn-tg').innerText = state.tgSub ? t.done : t.get;
            updateTasksUI();
            updateLvl();
        }

        let curType = 'house';
        function setTab(type) {
            curType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            renderList();
        }

        function renderList() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = '';
            let t = dict[state.lang];
            db[curType].forEach((item, index) => {
                const isOwned = state.owned[curType].includes(index);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-info">
                        <b>${item.n[state.lang]}</b>
                        <span>+${item.i.toLocaleString()} ֏/s</span>
                    </div>
                    <button class="buy-btn ${isOwned ? 'bought' : ''}" 
                        ${isOwned ? 'disabled' : ''} 
                        onclick="buy('${curType}', ${index})">
                        ${isOwned ? t.btnBought : item.p.toLocaleString() + ' ֏'}
                    </button>
                `;
                cont.appendChild(card);
            });
        }

        function buy(type, idx) {
            let item = db[type][idx];
            if (state.bal >= item.p) {
                state.bal -= item.p;
                state.owned[type].push(idx);
                calcInc();
                save();
                updateDisplay();
                renderList();
            }
        }

        function calcInc() {
            let total = 0;
            for (let type in state.owned) {
                state.owned[type].forEach(idx => {
                    total += db[type][idx].i;
                });
            }
            state.inc = total;
        }

        function updateLvl() {
            let next = levels.find(l => state.bal < l.m) || levels[levels.length - 1];
            let cur = levels[levels.indexOf(next) - 1] || levels[0];
            state.lvl = cur.l;
            state.maxE = cur.e;
            
            let progress = 0;
            if (next.l !== cur.l) {
                progress = Math.min(100, Math.floor(((state.bal - cur.m) / (next.m - cur.m)) * 100));
            } else {
                progress = 100;
            }

            document.getElementById('lvl-fill').style.width = progress + '%';
            document.getElementById('lvl-txt').innerText = `${dict[state.lang].lvlText} ${cur.l} | ${cur.n[state.lang]} (${progress}%)`;
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'shop') renderList();
            if(id === 'tasks') updateTasksUI();
        }

        async function handleTaskAd(type) {
            if (!AdController) return;
            let t = dict[state.lang];
            showModal(t.adMsg, "", "");

            try {
                const result = await AdController.show();
                hideModal();
                if (result.done) {
                    state.adCounts[type] = (state.adCounts[type] || 0) + 1;
                    if (state.adCounts[type] >= AD_REQS[type]) {
                        giveReward(type);
                        state.adCounts[type] = 0;
                    }
                    updateTasksUI();
                    save();
                }
            } catch (e) {
                hideModal();
            }
        }

        function giveReward(type) {
            let t = dict[state.lang];
            let bonus = 0;
            if (type === 'r1k') bonus = 1000;
            if (type === 'r5k') bonus = 5000;
            if (type === 'mystery') bonus = Math.floor(Math.random() * 60000) + 20000;
            if (type === 'doubleBal') state.bal *= 2;
            if (type === 'x2c') { state.clickMult = 2; state.multExpiry = Date.now() + 300000; }
            if (type === 'x3c') { state.clickMult = 3; state.multExpiry = Date.now() + 300000; }
            
            state.bal += bonus;
            updateDisplay();
            save();
        }

        function showModal(title, text, actionHtml) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-actions').innerHTML = actionHtml;
            document.getElementById('modal-overlay').classList.add('show');
        }

        function hideModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function updateDisplay() {
            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/s';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
            updateLvl();
        }

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                handleTap(e.touches[i].clientX, e.touches[i].clientY);
            }
        });

        function handleTap(x, y) {
            let now = Date.now();
            let currentMult = (state.multExpiry > now) ? state.clickMult : 1;
            let power = state.lvl * currentMult;

            if (state.energy >= 1) {
                state.energy -= 1;
                state.bal += power;
                spawnText(x, y, `+${power}`);
                updateDisplay();
            } else {
                let t = dict[state.lang];
                showModal(t.errEng, t.errEngT, `<button class="modal-btn" onclick="refillEnergyAd()">${t.watch}</button><button class="modal-btn-close" onclick="hideModal()">${t.close}</button>`);
            }
        }

        async function refillEnergyAd() {
            if (!AdController) return;
            const result = await AdController.show();
            if (result.done) {
                state.energy = state.maxE;
                hideModal();
                updateDisplay();
                save();
            }
        }

        function spawnText(x, y, txt) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.innerText = txt;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 40}px`;
            el.style.color = (state.multExpiry > Date.now()) ? '#00E676' : '#FFD700';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // ՓՈԽՎԵԼ Է ՀԻՇՈՂՈՒԹՅԱՆ ԲԱՆԱԼԻՆ՝ ՈՐՊԵՍԶԻ 1 ԱՆԳԱՄ ԶՐՈՅԱՑՎԻ
        function save() { localStorage.setItem('dram_master_v2', JSON.stringify(state)); }
        function load() {
            let s = localStorage.getItem('dram_master_v2');
            if (s) {
                let saved = JSON.parse(s);
                state = { ...state, ...saved };
                calcInc();
                applyLang();
                updateDisplay();
            }
        }

        setInterval(() => {
            state.bal += state.inc / 10;
            if (state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + (state.maxE / 1000));
            updateDisplay();
            if (Date.now() % 5000 < 100) save();
        }, 100);

        window.onload = () => { load(); applyLang(); };
    </script>
</body>
</html>

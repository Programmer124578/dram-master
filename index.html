<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --bg-dark: #0a0b10;
            --mint: #00E676;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at top, #1a1c29, var(--bg-dark));
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        /* Modal System */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-box {
            background: linear-gradient(145deg, #1e202e, #14151f);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,215,0,0.3);
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.show .modal-box {
            transform: translateY(0);
        }
        .modal-title {
            color: var(--gold);
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
        }
        .modal-text {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-btn {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .modal-btn-close {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            width: 100%;
            cursor: pointer;
        }

        /* Header */
        .header {
            padding: 15px;
            background: rgba(10, 11, 16, 0.9);
            backdrop-filter: blur(15px);
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .lvl-cont {
            width: 100%;
            height: 26px;
            background: rgba(0,0,0,0.8);
            border-radius: 13px;
            margin: 0 auto 15px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lvl-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700, #ff8c00);
            width: 0%;
            transition: width 0.3s ease;
        }
        .lvl-txt {
            position: relative;
            z-index: 10;
            font-size: 12px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }
        .balance-val {
            font-size: 42px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 4px 15px rgba(255,215,0,0.4);
            margin: 5px 0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #a0a0a0;
            font-weight: 700;
            padding: 0 5px;
        }
        
        /* Screens */
        .screen {
            display: none;
            padding: 20px 15px 95px;
            height: calc(100vh - 180px);
            overflow-y: auto;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Coin Area */
        .coin-area {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .main-coin {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle at 30% 30%, #fff9c4, #ffd700, #996515);
            border-radius: 50%;
            border: 8px solid #6b4c0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            color: #4a3600;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: transform 0.05s;
            touch-action: manipulation;
        }
        .main-coin:active {
            transform: scale(0.95);
        }

        /* Tabs & List */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-dark);
            padding: 10px 0;
            z-index: 500;
        }
        .tab-btn {
            flex: 1;
            padding: 14px 5px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
        }
        .card {
            background: rgba(25, 27, 38, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card-info b {
            color: var(--gold);
            font-size: 15px;
            display: block;
            margin-bottom: 6px;
        }
        .card-info span {
            font-size: 11px;
            color: #999;
        }
        .buy-btn {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: #000;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 12px;
            min-width: 95px;
            cursor: pointer;
        }
        .buy-btn.bought {
            background: var(--mint);
            color: #000;
        }
        .buy-btn:disabled {
            opacity: 0.4;
        }

        /* Nav */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 11, 16, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 800;
        }
        .nav-btn.active {
            color: var(--gold);
        }
        .nav-btn i {
            font-style: normal;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .float-text {
            position: absolute;
            font-weight: 900;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 2000;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
        .section-title {
            color: #fff;
            font-size: 18px;
            margin: 25px 0 15px;
            border-left: 4px solid var(--gold);
            padding-left: 10px;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-text" id="modal-text"></div>
            <div id="modal-actions"></div>
        </div>
    </div>

    <div class="header">
        <div class="lvl-cont">
            <div class="lvl-fill" id="lvl-fill"></div>
            <div class="lvl-txt" id="lvl-txt">Լևլ 1 | 0%</div>
        </div>
        <div class="balance-val" id="bal">0 ֏</div>
        <div class="stats">
            <span id="inc">0 ֏/վ</span>
            <span id="energy">⚡ 1000/1000</span>
        </div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-area">
            <div class="main-coin" id="coin">֏</div>
        </div>
    </div>

    <div id="shop" class="screen">
        <div class="tabs">
            <button class="tab-btn active" id="btn-house" onclick="setTab('house')">🏠 Գույք</button>
            <button class="tab-btn" id="btn-car" onclick="setTab('car')">🚗 Մեքենա</button>
            <button class="tab-btn" id="btn-biz" onclick="setTab('biz')">🏢 Բիզնես</button>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="tasks" class="screen">
        <h3 class="section-title">🌟 Սոցիալական</h3>
        <div class="card"><div class="card-info"><b>📢 Լուրերի Ալիք</b><span>+10,000 ֏ բոնուս</span></div><button class="buy-btn" onclick="subTg()" id="btn-tg">Միանալ</button></div>
        <div class="card"><div class="card-info"><b>👥 Հրավիրել</b><span>+5,000 ֏ ամեն մեկի համար</span></div><button class="buy-btn" onclick="inviteFriend()">Հրավիրել</button></div>

        <h3 class="section-title">🏦 Կապիտալի Բազմապատկում</h3>
        <div class="card"><div class="card-info"><b style="color:#FFD700">🔥 Կրկնապատկել Բալանսը</b><span>15 գովազդ</span></div><button class="buy-btn" onclick="handleAd('doubleBal')">Դիտել</button></div>
        
        <h3 class="section-title">🚀 Գովազդային Պարգևներ</h3>
        <div class="card"><div class="card-info"><b>💰 Միջին Պարգև</b><span>+5,000 ֏</span></div><button class="buy-btn" onclick="handleAd('r5k')">Դիտել</button></div>
        <div class="card"><div class="card-info"><b style="color:#b026ff">🎁 Կախարդական Արկղ</b><span>20k-80k ֏</span></div><button class="buy-btn" onclick="handleAd('mystery')">Դիտել</button></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="nav-game" onclick="nav('game')"><i>🪙</i>Խաղալ</button>
        <button class="nav-btn" id="nav-shop" onclick="nav('shop')"><i>🛒</i>Խանութ</button>
        <button class="nav-btn" id="nav-tasks" onclick="nav('tasks')"><i>🎁</i>Պարգևներ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0a0b10');

        let AdController;
        try { AdController = window.Adsgram.init({ blockId: "26025" }); } catch(e) {}

        let state = { 
            bal:0, inc:0, energy:1000, maxE:1000, lvl:1, 
            lastDaily:0, streak:1, dailyAdDone:0,
            owned:{house:[], car:[], biz:[]}, 
            tgSub:false, adCounts: { r5k:0, mystery:0, doubleBal:0 }
        };

        const db = {
            house: [
                {n:'Սենյակ', p:1000, i:2}, {n:'Բնակարան', p:5000, i:12}, {n:'Տնակ', p:15000, i:40}, 
                {n:'Գյուղական տուն', p:40000, i:110}, {n:'Առանձնատուն', p:100000, i:300}, {n:'Դուպլեքս', p:250000, i:800}, 
                {n:'Վիլլա', p:600000, i:2000}, {n:'Smart Home', p:4000000, i:15000}, {n:'Ocean Villa', p:10000000, i:40000}, 
                {n:'Պենտհաուս', p:25000000, i:110000}, {n:'Ամրոց', p:70000000, i:350000}, {n:'Կղզի', p:200000000, i:1000000},
                {n:'Երկնաքեր', p:500000000, i:3000000}, {n:'Ստորջրյա Բազա', p:1500000000, i:10000000}, {n:'Մարսի Գաղութ', p:5000000000, i:50000000}
            ],
            car: [
                {n:'Հեծանիվ', p:500, i:1}, {n:'Մոպեդ', p:1500, i:4}, {n:'VAZ 2107', p:4000, i:10}, 
                {n:'Opel Astra', p:12000, i:35}, {n:'Toyota Camry', p:35000, i:100}, {n:'Mercedes C', p:90000, i:280}, 
                {n:'Tesla Model 3', p:200000, i:700}, {n:'BMW M5', p:500000, i:1800}, {n:'Porsche 911', p:1200000, i:4500}, 
                {n:'Lamborghini', p:4000000, i:16000}, {n:'Bugatti', p:80000000, i:400000}, {n:'Rolls-Royce', p:150000000, i:800000},
                {n:'Ուղղաթիռ', p:400000000, i:2500000}, {n:'Մասնավոր Ինքնաթիռ', p:1200000000, i:8000000}, {n:'Տիեզերանավ', p:8000000000, i:60000000}
            ],
            biz: [
                {n:'Կրպակ', p:2000, i:5}, {n:'Ավտոլվացում', p:8000, i:25}, {n:'Սրճարան', p:25000, i:80}, 
                {n:'Վարսավիրանոց', p:60000, i:200}, {n:'Մարզասրահ', p:150000, i:550}, {n:'Ավտոսերվիս', p:400000, i:1600}, 
                {n:'Ռեստորան', p:1000000, i:4500}, {n:'IT Բիզնես', p:18000000, i:100000}, {n:'Բանկ', p:50000000, i:300000},
                {n:'Գործարան', p:120000000, i:700000}, {n:'Նավթային Հոր', p:350000000, i:2000000}, {n:'Ավիաընկերություն', p:800000000, i:5000000},
                {n:'Տեխնոլոգիական Հսկա', p:2000000000, i:15000000}, {n:'Էներգետիկ Ցանց', p:6000000000, i:50000000}, {n:'Գլոբալ Կորպորացիա', p:15000000000, i:150000000}
            ]
        };

        const levels = [
            {l:1, n:"Անօթևան", m:0, e:1000}, {l:2, n:"Մուրացկան", m:2000, e:2500}, 
            {l:3, n:"Բանվոր", m:10000, e:5000}, {l:4, n:"Արհեստավոր", m:50000, e:10000},
            {l:5, n:"Խանութպան", m:150000, e:25000}, {l:6, n:"Տնօրեն", m:400000, e:50000}, 
            {l:7, n:"Գործարար", m:1000000, e:100000}, {l:8, n:"Միլիոնատեր", m:2500000, e:250000},
            {l:9, n:"Միլիարդատեր", m:5000000, e:500000}, {l:10, n:"Մագնատ", m:15000000, e:1000000}, 
            {l:11, n:"Օլիգարխ", m:50000000, e:2000000}, {l:12, n:"Տիեզ. Օլիգարխ", m:5000000000, e:5000000}
        ];

        const dailyConfig = {
            1: { ads: 1, prize: 20000 }, 2: { ads: 3, prize: 60000 }, 3: { ads: 5, prize: 150000 },
            4: { ads: 5, prize: 400000 }, 5: { ads: 5, prize: 1000000 }, 6: { ads: 7, prize: 3000000 },
            7: { ads: 7, prize: 10000000 }
        };

        function showModal(title, text, btnText, onBtnClick, showClose = true) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            let actions = document.getElementById('modal-actions');
            actions.innerHTML = '';
            if(btnText) {
                let mainBtn = document.createElement('button'); mainBtn.className = 'modal-btn';
                mainBtn.innerText = btnText; mainBtn.onclick = onBtnClick; actions.appendChild(mainBtn);
            }
            if(showClose) {
                let closeBtn = document.createElement('button'); closeBtn.className = 'modal-btn-close';
                closeBtn.innerText = "Փակել"; closeBtn.onclick = () => document.getElementById('modal-overlay').classList.remove('show');
                actions.appendChild(closeBtn);
            }
            document.getElementById('modal-overlay').classList.add('show');
        }

        function playDirectAd(onSuccess) {
            if (!AdController) { tg.showAlert("Գովազդը բեռնվում է..."); return; }
            AdController.show().then(() => { onSuccess(); save(); }).catch(() => tg.showAlert("Գովազդ չկա։"));
        }

        function update() {
            let current = levels[0];
            for(let lv of levels) { if(state.bal >= lv.m) current = lv; }
            state.lvl = current.l; state.maxE = current.e;

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/վ';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
            
            let nxt = levels.find(x => x.l === current.l + 1);
            let prg = nxt ? ((state.bal - current.m) / (nxt.m - current.m)) * 100 : 100;
            document.getElementById('lvl-fill').style.width = Math.min(prg, 100) + '%';
            document.getElementById('lvl-txt').innerText = `Լևլ ${current.l} (${current.n}) | ${Math.floor(prg)}%`;
            
            if(state.tgSub) { let b = document.getElementById('btn-tg'); if(b) { b.innerText = 'Արված է'; b.classList.add('bought'); b.disabled = true; } }
        }

        function checkDailyBonus() {
            let now = Date.now();
            let diff = now - state.lastDaily;
            if (diff > 86400000) {
                if (diff > 172800000) { state.streak = 1; }
                let config = dailyConfig[state.streak];
                let remainingAds = config.ads - state.dailyAdDone;
                showModal(
                    `🎁 Օր ${state.streak}-ի Բոնուս`,
                    remainingAds > 0 ? `Դիտիր ${config.ads} գովազդ՝ ${config.prize.toLocaleString()} ֏ ստանալու համար: (Մնաց՝ ${remainingAds})` : "Պարգևը պատրաստ է:",
                    remainingAds > 0 ? `Դիտել (${state.dailyAdDone}/${config.ads})` : "Ստանալ Պարգևը",
                    function() {
                        if (remainingAds > 0) {
                            playDirectAd(() => { state.dailyAdDone++; save(); checkDailyBonus(); });
                        } else {
                            state.bal += config.prize; state.lastDaily = Date.now(); state.dailyAdDone = 0;
                            state.streak = state.streak >= 7 ? 1 : state.streak + 1; save(); update();
                            document.getElementById('modal-overlay').classList.remove('show');
                        }
                    }, false
                );
            }
        }

        window.handleAd = function(type) {
            playDirectAd(() => {
                if(type === 'r5k') state.bal += 5000;
                if(type === 'mystery') state.bal += Math.floor(Math.random()*60000)+20000;
                if(type === 'doubleBal') { state.adCounts.doubleBal++; if(state.adCounts.doubleBal >= 15) { state.bal *= 2; state.adCounts.doubleBal = 0; } }
                update(); save();
            });
        };

        window.nav = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
        };

        window.setTab = function(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            let c = document.getElementById('list-container'); c.innerHTML = '';
            db[t].forEach((item, index) => {
                let bought = state.owned[t].includes(index);
                let btn = bought ? `<button class="buy-btn bought" disabled>Գնված է</button>` : `<button class="buy-btn" ${state.bal < item.p ? 'disabled' : ''} onclick="buy('${t}', ${index})">Գնել</button>`;
                c.innerHTML += `<div class="card"><div class="card-info"><b>${item.n}</b><span>${item.p.toLocaleString()} ֏ | +${item.i}/վ</span></div>${btn}</div>`;
            });
        };

        window.buy = function(t, i) {
            let item = db[t][i];
            if(state.bal >= item.p && !state.owned[t].includes(i)) {
                state.bal -= item.p; state.inc += item.i; state.owned[t].push(i);
                update(); setTab(t); save();
            }
        };

        window.subTg = function() { tg.openTelegramLink('https://t.me/drammasternews'); setTimeout(() => { if(!state.tgSub) { state.bal += 10000; state.tgSub = true; update(); save(); } }, 3000); };
        window.inviteFriend = function() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/DramMasterBot`); state.bal += 5000; update(); save(); };

        document.getElementById('coin').onpointerdown = function(e) {
            let earn = Math.pow(2, state.lvl - 1);
            if(state.energy < earn) {
                showModal('⚡ Էներգիան Սպառվեց', 'Լիցքավորելու համար դիտիր գովազդ:', 'Դիտել', () => { playDirectAd(() => { state.energy = state.maxE; document.getElementById('modal-overlay').classList.remove('show'); update(); }); });
                return;
            }
            state.energy -= earn; state.bal += earn;
            tg.HapticFeedback.impactOccurred('light');
            let cx = e.clientX || (e.touches && e.touches[0].clientX);
            let cy = e.clientY || (e.touches && e.touches[0].clientY);
            let f = document.createElement('div'); f.className = 'float-text'; f.innerText = '+' + earn;
            f.style.left = cx - 20 + 'px'; f.style.top = cy - 40 + 'px';
            document.body.appendChild(f); setTimeout(() => f.remove(), 700); update();
        };

        function save() { localStorage.setItem('DramMaster_SecureSave', JSON.stringify(state)); }
        function load() {
            try { let s = localStorage.getItem('DramMaster_SecureSave'); if(s) { state = { ...state, ...JSON.parse(s) }; } } catch(e) {}
            update(); setTimeout(checkDailyBonus, 1000);
        }

        setInterval(() => { state.bal += state.inc; if(state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + (state.maxE/3600)); update(); }, 1000);
        setInterval(save, 5000); load();
    </script>
</body>
</html>

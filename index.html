<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro | Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #FF4500;
            --success: #00FA9A;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Header --- */
        .header {
            padding: 20px 15px;
            background: linear-gradient(to bottom, #1c1c1c, var(--bg));
            border-bottom: 3px solid var(--gold);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .balance-container {
            font-size: 42px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 5px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            font-size: 13px;
            color: #888;
            font-weight: bold;
        }

        /* --- Game Screen --- */
        .screen {
            display: none;
            height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active { display: block; }

        /* --- ՈՍԿԵԳՈՒՅՆ ԿՈՊԵԿ --- */
        .coin-wrapper {
            height: 55vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-coin {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #ffe066 0%, #b8860b 70%, #8b6914 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 12px solid #5e4a06;
            box-shadow: 0 0 50px rgba(184, 134, 11, 0.4), inset 0 0 30px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.05s;
        }

        .main-coin:active { transform: scale(0.92); }

        .coin-symbol {
            font-size: 120px;
            color: #5e4a06;
            font-weight: bold;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.1);
        }

        /* --- Shop Styling --- */
        .shop-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #222;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--gold);
            color: black;
        }

        .item-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .item-info b { font-size: 17px; display: block; color: var(--gold); }
        .item-info span { font-size: 13px; color: #aaa; }

        .buy-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
        }

        .buy-btn:disabled {
            background: #444;
            color: #777;
        }

        /* --- Navigation --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid #333;
        }

        .nav-item {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 24px; }

        /* Floating Text */
        .float-text {
            position: absolute;
            color: var(--gold);
            font-weight: bold;
            font-size: 30px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container" id="bal">0 ֏</div>
        <div class="stats-row">
            <span id="inc">Շահույթ: 0/վ</span>
            <span id="lvl">Լևլ: 1 (Սկսնակ)</span>
        </div>
        <div style="width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px;">
            <div id="en-bar" style="width: 100%; height: 100%; background: var(--success); border-radius: 3px;"></div>
        </div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-wrapper">
            <div class="main-coin" onclick="clickCoin(event)">
                <div class="coin-symbol">֏</div>
            </div>
            <p id="en-text" style="margin-top: 20px; color: #888;">⚡ Էներգիա: 500 / 500</p>
        </div>
    </div>

    <div id="shop" class="screen">
        <div class="shop-tabs">
            <button class="tab-btn active" onclick="tab('house')">🏠 Գույք</button>
            <button class="tab-btn" onclick="tab('car')">🚗 Մեքենա</button>
            <button class="tab-btn" onclick="tab('biz')">🏢 Բիզնես</button>
        </div>
        <div id="shop-list"></div>
    </div>

    <div id="extra" class="screen">
        <h2 style="color: var(--gold)">🚀 Բոնուսներ</h2>
        <div class="item-card">
            <div class="item-info"><b>Դիտել Գովազդ</b><span>+1,000 ֏ և Էներգիա</span></div>
            <button class="buy-btn" onclick="showAd()">Դիտել</button>
        </div>
        <div class="item-card">
            <div class="item-info"><b>Հրավիրիր Ընկեր</b><span>Յուրաքանչյուրը՝ 5,000 ֏</span></div>
            <button class="buy-btn" onclick="shareLink()">Հրավիրել</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="nav('game', this)"><span class="nav-icon">🪙</span>Խաղալ</button>
        <button class="nav-item" onclick="nav('shop', this)"><span class="nav-icon">🛒</span>Խանութ</button>
        <button class="nav-item" onclick="nav('extra', this)"><span class="nav-icon">💎</span>Բոնուս</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            bal: 0, inc: 0, energy: 500, maxE: 500, lvl: 1, 
            inv: {}, lastSave: Date.now()
        };

        const config = {
            levels: [
                { l: 1, n: "Սկսնակ", m: 0, mult: 1 },
                { l: 2, n: "Փորձնակ", m: 10000, mult: 2 },
                { l: 3, n: "Աշխատավոր", m: 50000, mult: 5 },
                { l: 4, n: "Գործարար", m: 200000, mult: 10 },
                { l: 5, n: "Միլիոնատեր", m: 1000000, mult: 25 },
                { l: 6, n: "Օլիգարխ", m: 10000000, mult: 100 }
            ],
            items: {
                house: [{id:'h1', n:'Հին սենյակ', p:1000, i:2}, {id:'h2', n:'Բնակարան', p:5000, i:12}, {id:'h3', n:'Առանձնատուն', p:25000, i:70}],
                car: [{id:'c1', n:'VAZ 2107', p:2000, i:5}, {id:'c2', n:'Mercedes C', p:15000, i:40}, {id:'c3', n:'Tesla 3', p:60000, i:180}],
                biz: [{id:'b1', n:'Կրպակ', p:3000, i:10}, {id:'b2', n:'Սրճարան', p:20000, i:60}, {id:'b3', n:'Բանկ', p:500000, i:1500}]
            }
        };

        // Adsgram Ինտեգրում
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "26025" }) : null;

        function updateUI() {
            let cl = config.levels.findLast(x => state.bal >= x.m) || config.levels[0];
            state.lvl = cl.l;
            state.maxE = 500 + (cl.l * 100);

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = `Շահույթ: ${state.inc.toLocaleString()}/վ`;
            document.getElementById('lvl').innerText = `Լևլ: ${cl.l} (${cl.n})`;
            document.getElementById('en-text').innerText = `⚡ Էներգիա: ${Math.floor(state.energy)} / ${state.maxE}`;
            document.getElementById('en-bar').style.width = (state.energy / state.maxE * 100) + '%';
        }

        function clickCoin(e) {
            if (state.energy < 1) return;
            state.energy--;
            let cl = config.levels.find(x => x.l === state.lvl);
            let earn = 1 * cl.mult;
            state.bal += earn;

            const f = document.createElement('div');
            f.className = 'float-text';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            f.innerText = `+${earn}`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
            
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        async function showAd() {
            if (!AdController) {
                alert("Գովազդը չի բեռնվել, ստուգեք ինտերնետը կամ անջատեք AdBlock:");
                return;
            }
            try {
                await AdController.show();
                state.bal += 1000;
                state.energy = state.maxE;
                updateUI();
                save();
            } catch(e) { console.log("Ad closed"); }
        }

        function tab(t) {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            config.items[t].forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-info"><b>${item.n}</b><span>Գին: ${item.p.toLocaleString()} ֏ | +${item.i}/վ</span></div>
                    <button class="buy-btn" onclick="buy('${t}','${item.id}')" ${state.bal < item.p ? 'disabled' : ''}>Գնել</button>
                `;
                list.appendChild(card);
            });
        }

        function buy(t, id) {
            const item = config.items[t].find(x => x.id === id);
            if (state.bal >= item.p) {
                state.bal -= item.p;
                state.inc += item.i;
                tg.HapticFeedback.notificationOccurred('success');
                tab(t);
                updateUI();
                save();
            }
        }

        function nav(s, b) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            b.classList.add('active');
            if(s === 'shop') tab('house');
        }

        function shareLink() {
            const url = `https://t.me/share/url?url=https://t.me/${tg.initDataUnsafe.user.username}?start=${tg.initDataUnsafe.user.id}&text=Միացիր ինձ Dram Master-ում և ստացիր բոնուսներ!`;
            tg.openTelegramLink(url);
        }

        setInterval(() => {
            state.bal += (state.inc / 10);
            if (state.energy < state.maxE) state.energy += 0.2;
            updateUI();
        }, 100);

        function save() { localStorage.setItem('dm_pro_state', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('dm_pro_state');
            if (s) state = JSON.parse(s);
            updateUI();
        }

        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dram Master VIP</title>
    <style>
        body { background: #000b1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; width: 90%; text-align: center; margin-bottom: 10px; border: 1px solid #1a3a5a; }
        #score { font-size: 40px; color: #ffcc00; font-weight: bold; }
        #level-info { color: #00ffcc; font-size: 16px; margin-top: 5px; }
        #coin { width: 180px; margin: 20px 0; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 15px #ffcc0055); }
        #coin:active { transform: scale(0.9); }
        .section-title { width: 100%; margin: 15px 0 5px 10px; font-size: 18px; color: #aaa; }
        .shop-container { width: 100%; max-height: 300px; overflow-y: auto; }
        .item { background: #0a192f; display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #1e2d44; }
        .item-info span { display: block; font-size: 14px; }
        .item-info .price { color: #ffcc00; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; }
        button:disabled { background: #333; color: #777; }
        .invite-btn { background: #28a745; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 16px; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stat-box">
        <div id="score">0 ֏</div>
        <div id="level-info">Level 1 (1 ֏ / click)</div>
        <div id="income" style="color: #00ffcc; font-size: 14px;">Բիզնեսի եկամուտ: +0/վրկ</div>
    </div>

    <img id="coin" src="https://www.svgrepo.com/show/272300/gold-coin.svg" alt="Click">

    <button class="invite-btn" onclick="invite()">Հրավիրել ընկերոջը (+5,000 ֏) 🔗</button>

    <div class="section-title">Խանութ և Բիզնես</div>
    <div class="shop-container" id="shop">
        <div class="item">
            <div class="item-info"><span>🚗 Էժան Մեքենա</span><span class="price">5,000 ֏</span></div>
            <button onclick="buy('car', 5000, 0)">Գնել</button>
        </div>
        <div class="item">
            <div class="item-info"><span>🏠 1 սենյականոց տուն</span><span class="price">20,000 ֏</span></div>
            <button onclick="buy('house1', 20000, 0)">Գնել</button>
        </div>
        <div class="item">
            <div class="item-info"><span>🏢 Սկսնակ Բիզնես</span><span class="price">100,000 ֏</span><span>+50 ֏/վրկ</span></div>
            <button onclick="buy('biz1', 100000, 50)">Գնել</button>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('dm_score')) || 0;
        let passive = parseInt(localStorage.getItem('dm_passive')) || 0;
        let level = parseInt(localStorage.getItem('dm_level')) || 1;
        let clickVal = level >= 2 ? 5 : 1;

        function update() {
            if (level === 1 && score >= 5000) { level = 2; clickVal = 5; alert("Level Up! Հիմա ամեն click-ը 5 ֏ է:"); }
            
            document.getElementById('score').textContent = Math.floor(score).toLocaleString() + " ֏";
            document.getElementById('level-info').textContent = `Level ${level} (${clickVal} ֏ / click)`;
            document.getElementById('income').textContent = `Բիզնեսի եկամուտ: +${passive}/վրկ`;
            
            localStorage.setItem('dm_score', score);
            localStorage.setItem('dm_passive', passive);
            localStorage.setItem('dm_level', level);
        }

        document.getElementById('coin').onclick = () => { score += clickVal; update(); };

        function buy(type, price, prod) {
            if (score >= price) {
                score -= price;
                passive += prod;
                alert("Գնումը կատարված է:");
                update();
            } else { alert("Գումարը չի բավականացնում:"); }
        }

        function invite() {
            score += 5000;
            update();
            const url = "https://t.me/share/url?url=https://t.me/dram_master_clicker_bot/play&text=Միացիր ինձ և ստացիր 5000 ֏ բոնուս:";
            window.open(url);
        }

        setInterval(() => { if(passive > 0) { score += passive; update(); } }, 1000);
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dram Master Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        button { padding: 12px 25px; font-size: 18px; color: white; background-color: #28a745; border: none; border-radius: 5px; cursor: pointer; }
        button:active { background-color: #218838; }
        .car-card { border: 1px solid #444; padding: 15px; margin: 10px; border-radius: 10px; background: #2a2a2a; }
        .balance { font-size: 24px; color: #ffd700; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <h1>💰 Dram Master 💰</h1>
        <p>Գրիր անունդ և սկսիր հարստանալ</p>
        <input type="text" id="player-name" placeholder="Քո անունը...">
        <br>
        <button onclick="startGame()">Մուտք Խաղ</button>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="display-name">Բարի գալուստ!</h2>
        <div class="balance">Հաշվեկշիռ: <span id="balance">0</span> ֏</div>
        
        <div class="car-card">
            <h3>🚗 Քո մեքենաները</h3>
            <p id="car-list">Դեռ մեքենա չունես</p>
            <button onclick="clickMoney()">Աշխատել 100 ֏</button>
        </div>

        <div class="shop">
            <h3>🛒 Խանութ</h3>
            <button onclick="buyCar('Opel Vectra', 5000)">Գնել Opel (5,000 ֏)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Բացում ենք խաղը ամբողջ էկրանով

        let balance = 0;
        let cars = [];

        function startGame() {
            const nameInput = document.getElementById('player-name').value;
            if (nameInput.trim() === "") {
                alert("Խնդրում եմ, գրիր անունդ:");
                return;
            }

            // ԿԱՐԵՎՈՐ. Լուր ենք ուղարկում Բոտին (Python-ին), որ խաղացողը միացավ
            // Սա կաշխատեցնի 5,000 ֏ բոնուսի համակարգը
            tg.sendData(JSON.stringify({
                action: "new_player_joined",
                name: nameInput
            }));

            // Անցնում ենք խաղի էկրանին
            document.getElementById('welcome-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-name').innerText = "Խաղացող: " + nameInput;
            
            // Փակում ենք WebApp-ը (ընտրովի, եթե ուզում ես կոճակը սեղմելուց հետո բոտը պատասխանի)
            // tg.close(); 
        }

        function clickMoney() {
            balance += 100;
            updateUI();
        }

        function buyCar(model, price) {
            if (balance >= price) {
                balance -= price;
                cars.push(model);
                updateUI();
                alert("Շնորհավոր! Դու գնեցիր " + model);
            } else {
                alert("Փողդ չի հերիքում!");
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            if (cars.length > 0) {
                document.getElementById('car-list').innerText = cars.join(", ");
            }
        }
    </script>
</body>
</html>

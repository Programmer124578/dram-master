<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro | Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root { --gold: #FFD700; --gold-dark: #B8860B; --bg-dark: #0f111a; --mint: #00E676; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: radial-gradient(circle at top, #1a1c29, var(--bg-dark)); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; user-select: none; }
        
        .header { padding: 20px 15px 15px; background: rgba(15, 17, 26, 0.85); backdrop-filter: blur(10px); text-align: center; border-bottom: 1px solid rgba(255,215,0,0.2); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .balance-val { font-size: 42px; font-weight: 900; color: var(--gold); text-shadow: 0 4px 15px rgba(255,215,0,0.4); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .stats { display: flex; justify-content: space-between; font-size: 14px; color: #b3b3b3; margin-top: 10px; font-weight: 600; padding: 0 10px; }
        
        .lvl-cont { width: 95%; height: 22px; background: rgba(0,0,0,0.5); border-radius: 12px; margin: 15px auto 0; position: relative; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .lvl-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #ffdf00, #ff8c00); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .lvl-txt { position: absolute; width: 100%; text-align: center; font-size: 12px; line-height: 22px; font-weight: 800; color: #fff; z-index: 5; text-shadow: 1px 1px 3px #000; letter-spacing: 0.5px; }

        .screen { display: none; padding: 20px 15px 90px; height: calc(100vh - 180px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: block; }

        .coin-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-coin { width: 250px; height: 250px; background: radial-gradient(circle at 30% 30%, #fff7b0, #ffdf00, #b8860b); border-radius: 50%; border: 6px solid #8b6508; display: flex; align-items: center; justify-content: center; font-size: 100px; color: #5e4a06; cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 -15px 30px rgba(139,101,8,0.8), inset 0 15px 30px rgba(255,255,255,0.8); transition: all 0.05s ease; touch-action: manipulation; text-shadow: 0 2px 5px rgba(255,255,255,0.5); }
        .main-coin:active { transform: scale(0.94) translateY(5px); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg-dark); padding: 10px 0; z-index: 500; }
        .tab-btn { flex: 1; padding: 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; font-size: 13px; font-weight: bold; backdrop-filter: blur(5px); transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, var(--gold), #ff8c00); color: #000; border: none; box-shadow: 0 4px 15px rgba(255,215,0,0.3); }

        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 16px; padding: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
        .card-info { flex: 1; }
        .card b { color: var(--gold); font-size: 16px; display: block; margin-bottom: 5px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .card span { font-size: 12px; color: #aaa; display: block; }
        
        .buy-btn { background: linear-gradient(135deg, var(--gold), #ff8c00); color: #000; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 900; font-size: 13px; min-width: 95px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); }
        .buy-btn:disabled { background: #333; color: #777; box-shadow: none; }
        .buy-btn.bought { background: var(--mint); color: #000; box-shadow: 0 0 10px rgba(0,230,118,0.4); }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(15, 17, 26, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-btn { background: none; border: none; color: #777; font-size: 11px; display: flex; flex-direction: column; align-items: center; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); transform: translateY(-3px); }
        .nav-btn i { font-style: normal; font-size: 26px; margin-bottom: 4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .float-text { position: absolute; font-weight: 900; font-size: 36px; pointer-events: none; animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 2000; text-shadow: 0px 3px 6px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.3); } }
        
        .section-title { color: #fff; font-size: 18px; margin: 25px 0 15px; border-left: 4px solid var(--gold); padding-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-val" id="bal">0 ֏</div>
        <div class="stats">
            <span id="inc">0 ֏/վ</span>
            <span id="energy">⚡ 500/500</span>
        </div>
        <div class="lvl-cont">
            <div class="lvl-fill" id="lvl-fill"></div>
            <div class="lvl-txt" id="lvl-txt">Աղքատ (Լևլ 1) | 0%</div>
        </div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-area">
            <div class="main-coin" id="coin">֏</div>
            <p id="boost-msg" style="font-weight:bold; margin-top:30px; display:none; font-size: 18px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);"></p>
        </div>
    </div>

    <div id="shop" class="screen">
        <div class="tabs">
            <button class="tab-btn active" id="btn-house" onclick="setTab('house')">🏠 Գույք</button>
            <button class="tab-btn" id="btn-car" onclick="setTab('car')">🚗 Մեքենա</button>
            <button class="tab-btn" id="btn-biz" onclick="setTab('biz')">🏢 Բիզնես</button>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="tasks" class="screen">
        <h3 class="section-title">🌟 Սոցիալական</h3>
        <div class="card" id="task-tg">
            <div class="card-info"><b>📢 Միանալ Ալիքին</b><span>Հետևիր @drammasternews-ին</span></div>
            <button class="buy-btn" onclick="subTg()" id="btn-tg">+10k ֏</button>
        </div>
        <div class="card">
            <div class="card-info"><b>👥 Հրավիրել Ընկերոջը</b><span>Ստացիր +5,000 ֏ բոնուս</span></div>
            <button class="buy-btn" onclick="inviteFriend()">Հրավիրել</button>
        </div>

        <h3 class="section-title">🚀 Գովազդի Բոնուսներ</h3>
        <div class="card">
            <div class="card-info"><b style="color:#b026ff">🎁 Օրվա Մեծ Արկղ</b><span>Շահիր 20k-80k ֏</span></div>
            <button class="buy-btn" onclick="showAd('mystery')">Բացել</button>
        </div>
        <div class="card">
            <div class="card-info"><b>⚡ Մաքս Էներգիա</b><span>Լիցքավորիր 100%</span></div>
            <button class="buy-btn" onclick="showAd('energy')">Դիտել</button>
        </div>
        <div class="card">
            <div class="card-info"><b>🔥 2X (5 րոպե)</b><span>Կրկնապատկիր քլիքդ</span></div>
            <button class="buy-btn" onclick="showAd('x2')">Դիտել</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="nav-game" onclick="nav('game')"><i>🪙</i>Խաղալ</button>
        <button class="nav-btn" id="nav-shop" onclick="nav('shop')"><i>🛒</i>Խանութ</button>
        <button class="nav-btn" id="nav-tasks" onclick="nav('tasks')"><i>🎁</i>Պարգևներ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let AdController;
        try { 
            AdController = window.Adsgram.init({ blockId: "26025" }); 
        } catch(e) { console.error("Adsgram init error"); }

        let state = { bal:0, inc:0, energy:500, maxE:500, lvl:1, x2T:0, x3T:0, last:Date.now(), owned:{house:[], car:[], biz:[]}, tgSub:false };

        const db = {
            house: [
                {n:'Սենյակ', p:1000, i:2}, {n:'Բնակարան', p:5000, i:12}, {n:'Տնակ', p:15000, i:40}, {n:'Գյուղական տուն', p:40000, i:110}, {n:'Առանձնատուն', p:100000, i:300},
                {n:'Դուպլեքս', p:250000, i:800}, {n:'Վիլլա Դիլիջանում', p:600000, i:2000}, {n:'Modern House', p:1500000, i:5500}, {n:'Smart Home', p:4000000, i:15000}, {n:'Ocean Villa', p:10000000, i:40000},
                {n:'Պենտհաուս', p:25000000, i:110000}, {n:'Ամրոց', p:70000000, i:350000}, {n:'Կղզի', p:200000000, i:1000000}, {n:'Թաղամաս', p:500000000, i:3000000}, {n:'Պալատ', p:1000000000, i:7000000}
            ],
            car: [
                {n:'Հեծանիվ', p:500, i:1}, {n:'Մոպեդ', p:1500, i:4}, {n:'VAZ 2107', p:4000, i:10}, {n:'Opel Astra', p:12000, i:35}, {n:'Toyota Camry', p:35000, i:100},
                {n:'Mercedes C', p:90000, i:280}, {n:'Tesla Model 3', p:200000, i:700}, {n:'BMW M5', p:500000, i:1800}, {n:'Porsche 911', p:1200000, i:4500}, {n:'Lamborghini', p:4000000, i:16000},
                {n:'Rolls Royce', p:10000000, i:45000}, {n:'Ferrari', p:30000000, i:140000}, {n:'Bugatti', p:80000000, i:400000}, {n:'Ուղղաթիռ', p:250000000, i:1500000}, {n:'Յախտա', p:700000000, i:5000000}
            ],
            biz: [
                {n:'Կրպակ', p:2000, i:5}, {n:'Ավտոլվացում', p:8000, i:25}, {n:'Սրճարան', p:25000, i:80}, {n:'Վարսավիրանոց', p:60000, i:200}, {n:'Մարզասրահ', p:150000, i:550},
                {n:'Ավտոսերվիս', p:400000, i:1600}, {n:'Ռեստորան', p:1000000, i:4500}, {n:'Գիշերային ակումբ', p:2500000, i:12000}, {n:'Շինարարություն', p:7000000, i:35000}, {n:'IT Բիզնես', p:18000000, i:100000},
                {n:'Բանկ', p:50000000, i:300000}, {n:'Գործարան', p:150000000, i:1000000}, {n:'Կորպորացիա', p:400000000, i:3000000}, {n:'Հանքեր', p:900000000, i:8000000}, {n:'Կայսրություն', p:2500000000, i:25000000}
            ]
        };

        const levels = [
            {l:1, n:"Աղքատ", m:0, e:500, k:1}, {l:2, n:"Բանվոր", m:5000, e:1000, k:3}, {l:3, n:"Ծառայող", m:20000, e:1500, k:7}, {l:4, n:"Մենեջեր", m:100000, e:2500, k:15},
            {l:5, n:"Տնօրեն", m:500000, e:4000, k:40}, {l:6, n:"Բիզնեսմեն", m:2000000, e:6000, k:100}, {l:7, n:"Միլիոնատեր", m:10000000, e:8000, k:250}, {l:8, n:"Մուլտիմիլիոնատեր", m:50000000, e:10000, k:600},
            {l:9, n:"Միլիարդատեր", m:200000000, e:15000, k:1500}, {l:10, n:"Մագնատ", m:1000000000, e:20000, k:4000}, {l:11, n:"Օլիգարխ", m:3000000000, e:30000, k:10000}, {l:12, n:"Տիեզ. Օլիգարխ", m:7000000000, e:50000, k:25000}
        ];

        function update() {
            let current = levels[0];
            for(let lv of levels) { if(state.bal >= lv.m) current = lv; }
            state.lvl = current.l; state.maxE = current.e;

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/վ';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
            
            let nxt = levels.find(x => x.l === current.l + 1);
            let prg = nxt ? ((state.bal - current.m) / (nxt.m - current.m)) * 100 : 100;
            document.getElementById('lvl-fill').style.width = Math.min(prg, 100) + '%';
            document.getElementById('lvl-txt').innerText = `${current.n} (Լևլ ${current.l}) | ${Math.floor(prg)}%`;
            
            let boostMsg = document.getElementById('boost-msg');
            let now = Date.now();
            if(now < state.x2T) { boostMsg.style.display = 'block'; boostMsg.style.color = '#FFD700'; boostMsg.innerText = '🔥 2X ԲՈՆՈՒՍԸ ԱԿՏԻՎ Է'; }
            else { boostMsg.style.display = 'none'; }

            if(state.tgSub) {
                let btnTg = document.getElementById('btn-tg');
                if(btnTg) { btnTg.innerText = 'Արված է'; btnTg.classList.add('bought'); btnTg.disabled = true; }
            }
        }

        window.nav = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id === 'shop') setTab('house');
        };

        window.setTab = function(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            db[t].forEach((item, index) => {
                let isBought = state.owned[t].includes(index);
                let canBuy = state.bal >= item.p && !isBought;
                
                let btnHTML = isBought 
                    ? `<button class="buy-btn bought" disabled>Գնված է</button>`
                    : `<button class="buy-btn" ${!canBuy ? 'disabled' : ''} onclick="buy('${t}', ${index})">Գնել</button>`;

                container.innerHTML += `
                    <div class="card">
                        <div class="card-info"><b>${item.n}</b><span>${item.p.toLocaleString()} ֏ | +${item.i}/վ</span></div>
                        ${btnHTML}
                    </div>`;
            });
        };

        window.buy = function(t, i) {
            let item = db[t][i];
            if(state.owned[t].includes(i)) return;
            if(state.bal >= item.p) {
                state.bal -= item.p;
                state.inc += item.i;
                state.owned[t].push(i);
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                update(); setTab(t); save();
            }
        };

        window.subTg = function() {
            if(state.tgSub) return;
            tg.openTelegramLink('https://t.me/drammasternews');
            setTimeout(() => {
                if(!state.tgSub) {
                    state.bal += 10000;
                    state.tgSub = true;
                    tg.showAlert("✅ Շնորհակալություն! Դուք ստացաք 10,000 ֏:");
                    update(); save();
                }
            }, 3000);
        };

        window.inviteFriend = function() {
            const botUsername = 'DramMasterBot'; // Փոխիր սա քո բոտի անունով
            const shareText = "Միացիր ինձ Dram Master-ում և սկսիր վաստակել իրական դրամներ:";
            const shareUrl = `https://t.me/share/url?url=https://t.me/${botUsername}?start=ref&text=${encodeURIComponent(shareText)}`;
            tg.openTelegramLink(shareUrl);
            
            // Տալիս ենք բոնուս հրավիրելու համար
            state.bal += 5000;
            tg.showAlert("✅ Հրավերը ուղարկված է! Դուք ստացաք 5,000 ֏ բոնուս:");
            update(); save();
        };

        document.getElementById('coin').onpointerdown = function(e) {
            if(state.energy < 1) return;
            state.energy--;
            
            let mult = (Date.now() < state.x2T) ? 2 : 1;
            let earn = levels[state.lvl-1].k * mult;
            state.bal += earn;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            let floatEl = document.createElement('div');
            floatEl.className = 'float-text';
            floatEl.innerText = '+' + earn;
            floatEl.style.color = (mult === 2) ? '#FFD700' : '#FFFFFF';

            let rect = e.target.getBoundingClientRect();
            let x = e.clientX || (e.touches && e.touches[0].clientX) || (rect.left + rect.width/2);
            let y = e.clientY || (e.touches && e.touches[0].clientY) || (rect.top + rect.height/2);
            
            floatEl.style.left = (x - 20) + 'px';
            floatEl.style.top = (y - 40) + 'px';
            document.body.appendChild(floatEl);

            setTimeout(() => floatEl.remove(), 800);
            update();
        };

        window.showAd = function(type) {
            if (!AdController) { tg.showAlert("Գովազդը բեռնվում է..."); return; }

            AdController.show().then(() => {
                if(type === 'mystery') {
                    let randomPrize = Math.floor(Math.random() * (80000 - 20000 + 1)) + 20000;
                    state.bal += randomPrize;
                    tg.showAlert(`🎁 Շնորհավոր! Շահեցիք ${randomPrize.toLocaleString()} ֏!`);
                }
                if(type === 'energy') { state.energy = state.maxE; tg.showAlert("⚡ Էներգիան լիցքավորվեց!"); }
                if(type === 'x2') { state.x2T = Date.now() + 300000; tg.showAlert("🔥 2X բոնուսը միացավ!"); }
                update(); save();
            }).catch(() => { tg.showAlert("Գովազդը հասանելի չէ այս պահին:"); });
        };

        function save() { state.last = Date.now(); localStorage.setItem('dm_save_v15', JSON.stringify(state)); }
        function load() {
            let s = localStorage.getItem('dm_save_v15');
            if(s) {
                let parsed = JSON.parse(s);
                state = { ...state, ...parsed };
                let diff = (Date.now() - state.last) / 1000;
                if(diff > 0) state.bal += state.inc * diff;
            }
            update();
        }

        setInterval(() => {
            state.bal += state.inc / 10;
            if(state.energy < state.maxE) state.energy += 0.05; 
            update();
        }, 100);

        load();
        setInterval(save, 5000);
    </script>
</body>
</html>

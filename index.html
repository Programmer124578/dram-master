<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master - Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --green: #00ff88; --bg: #0b0b0b; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; }
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .active { display: flex; flex-direction: column; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--gold); border-radius: 0 0 20px 20px; text-align: center; }
        .balance { font-size: 38px; font-weight: bold; color: var(--green); margin: 10px 0; }
        .tap-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .coin { width: 220px; height: 220px; background: linear-gradient(135deg, var(--gold), #b8860b); border-radius: 50%; border: 8px solid #8b6508; box-shadow: 0 0 30px rgba(255,204,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 70px; transition: transform 0.05s; }
        .coin:active { transform: scale(0.92); }
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #444; color: #777; cursor: not-allowed; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
        .nav-item { color: #666; font-size: 12px; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome-screen" class="screen active" style="align-items: center; justify-content: center;">
        <h1 style="color: var(--gold);">DRAM MASTER</h1>
        <input type="text" id="username" placeholder="Քո անունը">
        <button onclick="initGame()" style="background: var(--gold); padding: 15px 40px; border-radius: 10px; border: none; font-weight: bold;">ՍԿՍԵԼ</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="header">
            <div id="user-display" style="color: var(--gold); font-size: 14px;"></div>
            <div class="balance"><span id="balance">0</span> ֏</div>
            <div style="font-size: 13px; color: #888;">+<span id="pps">0</span> ֏/վրկ | Կլիկը՝ <span id="cpc">1</span> ֏</div>
        </div>
        <div class="tap-area">
            <div class="coin" onclick="handleTap(event)">֏</div>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="color: var(--gold);">Շուկա</h2>
        <div id="shop-content"></div>
    </div>

    <div id="task-screen" class="screen">
        <h2 style="color: var(--gold);">Առաջադրանքներ</h2>
        <div class="card">
            <div class="card-info">
                <h4>Միացիր Dram Master News-ին</h4>
                <p>Պարգև՝ 10,000 ֏</p>
            </div>
            <button id="task-btn" class="buy-btn" onclick="startTask()">Միանալ</button>
        </div>
        <p id="task-status" style="font-size: 12px; color: #888; text-align: center;"></p>
    </div>

    <nav class="nav" id="main-nav" style="display: none;">
        <div class="nav-item active" onclick="navTo('game')">🪙<br>Խաղ</div>
        <div class="nav-item" onclick="navTo('shop')">🛒<br>Շուկա</div>
        <div class="nav-item" onclick="navTo('task')">📋<br>Առաջադրանք</div>
    </nav>
</div>

<script>
    let state = { bal: 0, cpc: 1, pps: 0, name: "", tasks: [] };

    const items = [
        { id: 'b1', n: "Կլիկ x2", p: 1000, type: 'boost', val: 2 },
        { id: 'b2', n: "Կլիկ x5", p: 10000, type: 'boost', val: 5 },
        { id: 'c1', n: "Opel Vectra", p: 2500, type: 'passive', val: 5 },
        { id: 'c2', n: "Mercedes C180", p: 12000, type: 'passive', val: 20 },
        { id: 'c3', n: "BMW M5 F10", p: 70000, type: 'passive', val: 100 },
        { id: 'bz1', n: "Կրպակ", p: 10000, type: 'passive', val: 25 },
        { id: 'bz2', n: "Ավտոլվացում", p: 45000, type: 'passive', val: 130 }
    ];

    function initGame() {
        const n = document.getElementById('username').value;
        if(!n) return;
        state.name = n;
        document.getElementById('user-display').innerText = n;
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        document.getElementById('main-nav').style.display = 'flex';
        load();
        renderShop();
        setInterval(tick, 1000);
    }

    function handleTap() {
        state.bal += state.cpc;
        updateUI();
    }

    function tick() {
        state.bal += state.pps;
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('pps').innerText = state.pps;
        document.getElementById('cpc').innerText = state.cpc;
        renderShop();
    }

    function renderShop() {
        const cont = document.getElementById('shop-content');
        if(!cont) return;
        cont.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <h4>${item.n}</h4>
                    <p style="font-size:11px; color:#888;">Գինը՝ ${item.p.toLocaleString()} ֏</p>
                </div>
                <button class="buy-btn" onclick="buy('${item.id}')" ${state.bal < item.p ? 'disabled' : ''}>Գնել</button>
            `;
            cont.appendChild(card);
        });
    }

    function buy(id) {
        const item = items.find(i => i.id === id);
        if(state.bal >= item.p) {
            state.bal -= item.p;
            if(item.type === 'boost') state.cpc = item.val;
            else state.pps += item.val;
            updateUI();
            save();
        }
    }

    function startTask() {
        window.open('https://t.me/drammasternews', '_blank');
        if(state.tasks.includes('sub')) return;
        
        const btn = document.getElementById('task-btn');
        btn.disabled = true;
        btn.innerText = "Սպասեք...";
        
        let sec = 10;
        const timer = setInterval(() => {
            sec--;
            document.getElementById('task-status').innerText = `Ստուգում ${sec} վայրկյանից...`;
            if(sec <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "Ստանալ 10,000 ֏";
                btn.onclick = claimTask;
                document.getElementById('task-status').innerText = "Պատրաստ է";
            }
        }, 1000);
    }

    function claimTask() {
        state.bal += 10000;
        state.tasks.push('sub');
        save();
        updateUI();
        document.getElementById('task-btn').innerText = "✅ Ստացված է";
        document.getElementById('task-btn').disabled = true;
    }

    function navTo(s) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(s + '-screen').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function save() { localStorage.setItem('dm_save_pro', JSON.stringify(state)); }
    function load() {
        const s = localStorage.getItem('dm_save_pro');
        if(s) {
            state = JSON.parse(s);
            if(state.tasks.includes('sub')) {
                const btn = document.getElementById('task-btn');
                btn.innerText = "✅ Ստացված է";
                btn.disabled = true;
            }
        }
        updateUI();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0c; --card: #16161d; --text: #ffffff; --mint: #00E676; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        
        /* Վերևի մասը (Balance & Stats) */
        .header { padding: 20px 15px; background: #111; text-align: center; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 1000; }
        .balance-val { font-size: 38px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .stats { display: flex; justify-content: space-around; font-size: 14px; color: #aaa; margin-top: 8px; font-weight: bold; }
        
        .lvl-cont { width: 90%; height: 20px; background: #222; border-radius: 10px; margin: 12px auto 0; position: relative; border: 1px solid #444; overflow: hidden; }
        .lvl-fill { height: 100%; background: linear-gradient(90deg, #b8860b, var(--gold)); width: 0%; transition: width 0.4s ease; }
        .lvl-txt { position: absolute; width: 100%; text-align: center; font-size: 11px; line-height: 20px; font-weight: bold; color: #fff; z-index: 5; text-shadow: 1px 1px 2px #000; }

        /* Էկրանների կառավարում */
        .screen { display: none; padding: 15px; height: calc(100vh - 170px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: block; }

        /* Խաղի հատված */
        .coin-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-coin { width: 230px; height: 230px; background: radial-gradient(circle, #ffe066, #b8860b); border-radius: 50%; border: 8px solid #5e4a06; display: flex; align-items: center; justify-content: center; font-size: 90px; color: #5e4a06; cursor: pointer; box-shadow: 0 0 30px rgba(212,175,55,0.3); transition: transform 0.05s; }
        .main-coin:active { transform: scale(0.92); }

        /* Խանութի տաբեր */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 5px 0; z-index: 500; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 13px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Քարտեր */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a2a30; }
        .card b { color: var(--gold); font-size: 15px; display: block; margin-bottom: 3px; }
        .card span { font-size: 11px; color: #999; }
        
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 900; font-size: 13px; min-width: 90px; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* Նավիգացիա */
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0 30px; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #666; font-size: 11px; display: flex; flex-direction: column; align-items: center; font-weight: bold; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-style: normal; font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-val" id="bal">0 ֏</div>
        <div class="stats">
            <span id="inc">0 ֏/վ</span>
            <span id="energy">⚡ 500/500</span>
        </div>
        <div class="lvl-cont">
            <div class="lvl-fill" id="lvl-fill"></div>
            <div class="lvl-txt" id="lvl-txt">Լևլ 1 | 0%</div>
        </div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-area">
            <div class="main-coin" id="coin">֏</div>
            <p id="x2-msg" style="color:var(--mint); font-weight:bold; margin-top:20px; display:none;">🔥 2X ԲՈՆՈՒՍԸ ԱԿՏԻՎ Է</p>
        </div>
    </div>

    <div id="shop" class="screen">
        <div class="tabs">
            <button class="tab-btn active" id="btn-house" onclick="setTab('house')">🏠 Գույք</button>
            <button class="tab-btn" id="btn-car" onclick="setTab('car')">🚗 Մեքենա</button>
            <button class="tab-btn" id="btn-biz" onclick="setTab('biz')">🏢 Բիզնես</button>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="tasks" class="screen">
        <h3 style="color:var(--gold); margin-bottom:15px;">🚀 Գովազդի Պարգևներ</h3>
        <div class="card">
            <div><b>💰 Մեծ Գումար</b><span>Դիտել գովազդ (+15,000 ֏)</span></div>
            <button class="buy-btn" onclick="showAd('money')">Դիտել</button>
        </div>
        <div class="card">
            <div><b>🔥 2X Շահույթ</b><span>5 րոպե կրկնակի կլիկ</span></div>
            <button class="buy-btn" onclick="showAd('x2')">Դիտել</button>
        </div>
        <div class="card">
            <div><b>⚡ Էներգիա</b><span>Ամբողջական լիցքավորում</span></div>
            <button class="buy-btn" onclick="showAd('energy')">Դիտել</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="nav-game" onclick="nav('game')"><i>🪙</i>Խաղալ</button>
        <button class="nav-btn" id="nav-shop" onclick="nav('shop')"><i>🛒</i>Խանութ</button>
        <button class="nav-btn" id="nav-tasks" onclick="nav('tasks')"><i>🎁</i>Պարգևներ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = { bal:0, inc:0, energy:500, maxE:500, lvl:1, x2T:0, last:Date.now() };

        // Բոլոր 45 իրերը
        const db = {
            house: [
                {n:'Սենյակ', p:1000, i:2}, {n:'Բնակարան', p:5000, i:12}, {n:'Տնակ', p:15000, i:40}, {n:'Գյուղական տուն', p:40000, i:110}, {n:'Առանձնատուն', p:100000, i:300},
                {n:'Դուպլեքս', p:250000, i:800}, {n:'Վիլլա Դիլիջանում', p:600000, i:2000}, {n:'Modern House', p:1500000, i:5500}, {n:'Smart Home', p:4000000, i:15000}, {n:'Ocean Villa', p:10000000, i:40000},
                {n:'Պենտհաուս', p:25000000, i:110000}, {n:'Ամրոց', p:70000000, i:350000}, {n:'Կղզի', p:200000000, i:1000000}, {n:'Թաղամաս', p:500000000, i:3000000}, {n:'Պալատ', p:1000000000, i:7000000}
            ],
            car: [
                {n:'Հեծանիվ', p:500, i:1}, {n:'Մոպեդ', p:1500, i:4}, {n:'VAZ 2107', p:4000, i:10}, {n:'Opel Astra', p:12000, i:35}, {n:'Toyota Camry', p:35000, i:100},
                {n:'Mercedes C', p:90000, i:280}, {n:'Tesla Model 3', p:200000, i:700}, {n:'BMW M5', p:500000, i:1800}, {n:'Porsche 911', p:1200000, i:4500}, {n:'Lamborghini', p:4000000, i:16000},
                {n:'Rolls Royce', p:10000000, i:45000}, {n:'Ferrari', p:30000000, i:140000}, {n:'Bugatti', p:80000000, i:400000}, {n:'Ուղղաթիռ', p:250000000, i:1500000}, {n:'Յախտա', p:700000000, i:5000000}
            ],
            biz: [
                {n:'Կրպակ', p:2000, i:5}, {n:'Ավտոլվացում', p:8000, i:25}, {n:'Սրճարան', p:25000, i:80}, {n:'Վարսավիրանոց', p:60000, i:200}, {n:'Մարզասրահ', p:150000, i:550},
                {n:'Ավտոսերվիս', p:400000, i:1600}, {n:'Ռեստորան', p:1000000, i:4500}, {n:'Գիշերային ակումբ', p:2500000, i:12000}, {n:'Շինարարություն', p:7000000, i:35000}, {n:'IT Բիզնես', p:18000000, i:100000},
                {n:'Բանկ', p:50000000, i:300000}, {n:'Գործարան', p:150000000, i:1000000}, {n:'Կորպորացիա', p:400000000, i:3000000}, {n:'Հանքեր', p:900000000, i:8000000}, {n:'Կայսրություն', p:2500000000, i:25000000}
            ]
        };

        const levels = [
            {l:1, m:0, e:500, k:1}, {l:2, m:5000, e:1000, k:3}, {l:3, m:20000, e:1500, k:7}, {l:4, m:100000, e:2500, k:15},
            {l:5, m:500000, e:4000, k:40}, {l:6, m:2000000, e:6000, k:100}, {l:7, m:10000000, e:8000, k:250}, {l:8, m:50000000, e:10000, k:600},
            {l:9, m:200000000, e:15000, k:1500}, {l:10, m:1000000000, e:20000, k:4000}, {l:11, m:3000000000, e:30000, k:10000}, {l:12, m:7000000000, e:50000, k:25000}
        ];

        function update() {
            // Լևլի հաշվարկ
            let current = levels[0];
            for(let lv of levels) { if(state.bal >= lv.m) current = lv; }
            state.lvl = current.l; state.maxE = current.e;

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/վ';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
            
            let nxt = levels.find(x => x.l === current.l + 1);
            let prg = nxt ? ((state.bal - current.m) / (nxt.m - current.m)) * 100 : 100;
            document.getElementById('lvl-fill').style.width = Math.min(prg, 100) + '%';
            document.getElementById('lvl-txt').innerText = `Լևլ ${current.l} | ${Math.floor(prg)}%`;
            
            document.getElementById('x2-msg').style.display = (Date.now() < state.x2T) ? 'block' : 'none';
        }

        // Նավիգացիա
        window.nav = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id === 'shop') setTab('house');
        };

        // Խանութի տաբեր
        window.setTab = function(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            db[t].forEach((item, index) => {
                let canBuy = state.bal >= item.p;
                container.innerHTML += `
                    <div class="card">
                        <div><b>${item.n}</b><span>${item.p.toLocaleString()} ֏ | +${item.i}/վ</span></div>
                        <button class="buy-btn" ${!canBuy ? 'disabled' : ''} onclick="buy('${t}', ${index})">Գնել</button>
                    </div>`;
            });
        };

        window.buy = function(t, i) {
            let item = db[t][i];
            if(state.bal >= item.p) {
                state.bal -= item.p;
                state.inc += item.i;
                tg.HapticFeedback.notificationOccurred('success');
                update();
                setTab(t);
                save();
            }
        };

        // Կլիկ
        document.getElementById('coin').onclick = function(e) {
            if(state.energy < 1) return;
            state.energy--;
            let mult = (Date.now() < state.x2T) ? 2 : 1;
            let earn = levels[state.lvl-1].k * mult;
            state.bal += earn;
            tg.HapticFeedback.impactOccurred('light');
            update();
        };

        // ԳՈՎԱԶԴ (Adsgram)
        window.showAd = function(type) {
            // Երբ բլոկը ակտիվ լինի, սա ավտոմատ կբերի գովազդը
            const AdController = window.Adsgram.init({ blockId: "dd66" });
            
            AdController.show().then(() => {
                if(type === 'money') state.bal += 15000;
                if(type === 'x2') state.x2T = Date.now() + 300000;
                if(type === 'energy') state.energy = state.maxE;
                tg.showAlert("Շնորհավոր! Պարգևը ստացված է:");
                update(); save();
            }).catch(() => {
                tg.showAlert("Գովազդը դեռ հասանելի չէ։ Փորձեք մի փոքր ուշ։");
            });
        };

        // Պահպանում
        function save() { state.last = Date.now(); localStorage.setItem('dm_save_v12', JSON.stringify(state)); }
        function load() {
            let s = localStorage.getItem('dm_save_v12');
            if(s) {
                state = JSON.parse(s);
                let diff = (Date.now() - state.last) / 1000;
                if(diff > 0) state.bal += state.inc * diff;
            }
            update();
        }

        // Հիմնական ցիկլ
        setInterval(() => {
            state.bal += state.inc / 10;
            if(state.energy < state.maxE) state.energy += 0.4;
            update();
        }, 100);

        load();
        setInterval(save, 5000);
    </script>
</body>
</html>

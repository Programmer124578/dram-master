<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master - Empire Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --green: #00ff88; --bg: #0b0b0b; --card: #1a1a1a; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; }
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; }
        .active { display: flex; flex-direction: column; }

        /* Header & Progress */
        .header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--gold); border-radius: 0 0 25px 25px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .balance { font-size: 36px; font-weight: 900; color: var(--green); margin: 5px 0; }
        .level-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .progress-container { width: 100%; background: #333; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ffcc00); transition: width 0.3s; }

        /* Coin */
        .tap-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .coin { width: 230px; height: 230px; background: linear-gradient(135deg, var(--gold), #8b6508); border-radius: 50%; border: 8px solid #5c4306; box-shadow: 0 0 50px rgba(255,204,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 90px; transition: transform 0.05s; }
        .coin:active { transform: scale(0.95); }

        /* Market */
        .section-title { color: var(--gold); margin: 25px 0 10px; font-size: 18px; border-left: 4px solid var(--gold); padding-left: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .card-info h4 { margin: 0; font-size: 15px; }
        .card-info p { margin: 4px 0 0; font-size: 11px; color: #888; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .bought { background: #00ff88 !important; color: black !important; }

        /* Nav */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #666; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome-screen" class="screen">
        <h1 style="color: var(--gold); text-align: center; margin-top: 60px;">DRAM MASTER</h1>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1;">
            <input type="text" id="username" placeholder="Մուտքագրեք ձեր անունը" style="width: 80%; padding: 18px; border-radius: 15px; border: none; text-align: center; font-size: 18px;">
            <button onclick="saveName()" style="background: var(--gold); padding: 18px 60px; border-radius: 15px; border: none; font-weight: bold; margin-top: 25px; cursor: pointer;">ՄՈՒՏՔ</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="header">
            <div class="level-info">
                <span id="user-display"></span>
                <span>Level <span id="lvl-num">1</span></span>
            </div>
            <div class="balance"><span id="balance">0</span> ֏</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #aaa;">
                <span>Կլիկ: <b id="cpc-val">1</b></span>
                <span>Վրկ: <b id="pps-val">0</b></span>
            </div>
        </div>
        <div class="tap-area">
            <div class="coin" onclick="handleTap(event)">֏</div>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="color: var(--gold);">🛒 Շուկա</h2>
        <div class="section-title">Ավտոպարկ (15)</div>
        <div id="cars-list"></div>
        <div class="section-title">Բիզնեսներ (15)</div>
        <div id="biz-list"></div>
        <div class="section-title">Գույք (15)</div>
        <div id="prop-list"></div>
    </div>

    <div id="task-screen" class="screen">
        <h2 style="color: var(--gold);">📋 Առաջադրանքներ</h2>
        <div class="card">
            <div class="card-info">
                <h4>Միացիր Dram Master News-ին</h4>
                <p>Պարգև՝ 10,000 ֏</p>
            </div>
            <button id="task-btn" class="buy-btn" onclick="startTask()">Միանալ</button>
        </div>
        <button class="buy-btn" onclick="inviteFriend()" style="width: 100%; margin-top: 15px; padding: 20px;">👥 ՀՐԱՎԻՐԵԼ ԸՆԿԵՐՈՋ (+5,000 ֏)</button>
    </div>

    <nav class="nav" id="main-nav" style="display: none;">
        <div class="nav-item active" onclick="navTo('game')">🪙<br>Խաղ</div>
        <div class="nav-item" onclick="navTo('shop')">🛒<br>Շուկա</div>
        <div class="nav-item" onclick="navTo('task')">📋<br>Գործեր</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let state = { bal: 0, total_clicks: 0, lvl: 1, pps: 0, name: "", tasks: [], inventory: [] };

    const levels = [
        { lvl: 1, req: 0, cpc: 1 },
        { lvl: 2, req: 1000, cpc: 5 },
        { lvl: 3, req: 10000, cpc: 20 },
        { lvl: 4, req: 50000, cpc: 100 },
        { lvl: 5, req: 150000, cpc: 500 },
        { lvl: 6, req: 500000, cpc: 2000 },
        { lvl: 7, req: 1500000, cpc: 10000 },
        { lvl: 8, req: 10000000, cpc: 50000 }
    ];

    const items = {
        cars: [
            { id: 'c1', n: "Opel Vectra", p: 2500, v: 2 }, { id: 'c2', n: "Mercedes C180", p: 9000, v: 8 },
            { id: 'c3', n: "BMW M5 F10", p: 45000, v: 30 }, { id: 'c4', n: "Range Rover", p: 120000, v: 100 },
            { id: 'c5', n: "Tesla Model 3", p: 350000, v: 250 }, { id: 'c6', n: "Audi RS7", p: 900000, v: 700 },
            { id: 'c7', n: "Porsche 911", p: 2500000, v: 1800 }, { id: 'c8', n: "Nissan GTR", p: 6000000, v: 4500 },
            { id: 'c9', n: "Lamborghini Urus", p: 15000000, v: 12000 }, { id: 'c10', n: "Ferrari SF90", p: 40000000, v: 30000 },
            { id: 'c11', n: "Rolls Royce Cullinan", p: 100000000, v: 80000 }, { id: 'c12', n: "Bugatti Chiron", p: 300000000, v: 250000 },
            { id: 'c13', n: "Pagani Huayra", p: 800000000, v: 600000 }, { id: 'c14', n: "Koenigsegg Jesko", p: 2000000000, v: 1500000 },
            { id: 'c15', n: "Mercedes Vision AVTR", p: 5000000000, v: 4000000 }
        ],
        biz: [
            { id: 'b1', n: "Կրպակ", p: 6000, v: 5 }, { id: 'b2', n: "Ավտոլվացում", p: 25000, v: 20 },
            { id: 'b3', n: "Սրճարան", p: 100000, v: 80 }, { id: 'b4', n: "Բենզալցակայան", p: 500000, v: 400 },
            { id: 'b5', n: "Սուպերմարկետ", p: 2000000, v: 1500 }, { id: 'b6', n: "Գործարան", p: 8000000, v: 6000 },
            { id: 'b7', n: "Գիշերային ակումբ", p: 25000000, v: 20000 }, { id: 'b8', n: "Հյուրանոց", p: 100000000, v: 85000 },
            { id: 'b9', n: "Առևտրի կենտրոն", p: 400000000, v: 350000 }, { id: 'b10', n: "Կազինո", p: 1200000000, v: 1000000 },
            { id: 'b11', n: "Բանկ", p: 4000000000, v: 3000000 }, { id: 'b12', n: "ՏՏ Հոլդինգ", p: 15000000000, v: 12000000 },
            { id: 'b13', n: "Նավթային հոր", p: 50000000000, v: 40000000 }, { id: 'b14', n: "Ավիաընկերություն", p: 200000000000, v: 150000000 },
            { id: 'b15', n: "Տիեզերական գործակալություն", p: 1000000000000, v: 800000000 }
        ],
        prop: [
            { id: 'p1', n: "Բնակարան (1 սենյակ)", p: 40000, v: 15 }, { id: 'p2', n: "Բնակարան (3 սենյակ)", p: 150000, v: 60 },
            { id: 'p3', n: "Առանձնատուն", p: 600000, v: 250 }, { id: 'p4', n: "Ամառանոց Սևանում", p: 2000000, v: 900 },
            { id: 'p5', n: "Պենտհաուս", p: 8000000, v: 4000 }, { id: 'p6', n: "Վիլլա Իտալիայում", p: 35000000, v: 18000 },
            { id: 'p7', n: "Սեփական կղզի", p: 150000000, v: 80000 }, { id: 'p8', n: "Պատմական դղյակ", p: 600000000, v: 350000 },
            { id: 'p9', n: "Երկնաքեր", p: 2500000000, v: 1500000 }, { id: 'p10', n: "Սեփական քաղաք", p: 10000000000, v: 6000000 },
            { id: 'p11', n: "Ստորջրյա բազա", p: 40000000000, v: 25000000 }, { id: 'p12', n: "Լուսնային կայան", p: 150000000000, v: 100000000 },
            { id: 'p13', n: "Մարսի գաղութ", p: 500000000000, v: 350000000 }, { id: 'p14', n: "Օվկիանոսային քաղաք", p: 2000000000000, v: 1200000000 },
            { id: 'p15', n: "Գալակտիկական կայան", p: 10000000000000, v: 6000000000 }
        ]
    };

    function saveName() {
        const n = document.getElementById('username').value;
        if(!n) return;
        state.name = n;
        save(); initUI();
    }

    function initUI() {
        document.getElementById('user-display').innerText = state.name;
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        document.getElementById('main-nav').style.display = 'flex';
        renderShop();
        setInterval(tick, 1000);
    }

    function handleTap(e) {
        let currentLevelObj = levels.find(l => l.lvl === state.lvl);
        state.bal += currentLevelObj.cpc;
        state.total_clicks += currentLevelObj.cpc;
        checkLevel();
        updateUI();
        tg.HapticFeedback.impactOccurred('light');
    }

    function checkLevel() {
        let nextLevelObj = levels.find(l => l.lvl === state.lvl + 1);
        if(nextLevelObj && state.total_clicks >= nextLevelObj.req) {
            state.lvl++;
            tg.HapticFeedback.notificationOccurred('success');
            alert("Շնորհավոր! Նոր մակարդակ՝ " + state.lvl);
        }
        updateLevelBar();
    }

    function updateLevelBar() {
        let currentLvl = levels.find(l => l.lvl === state.lvl);
        let nextLvl = levels.find(l => l.lvl === state.lvl + 1);
        if(!nextLvl) {
            document.getElementById('progress-bar').style.width = "100%";
        } else {
            let totalNeeded = nextLvl.req - currentLvl.req;
            let currentInLvl = state.total_clicks - currentLvl.req;
            let percent = (currentInLvl / totalNeeded) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
        }
        document.getElementById('lvl-num').innerText = state.lvl;
        document.getElementById('cpc-val').innerText = currentLvl.cpc;
    }

    function tick() {
        state.bal += state.pps;
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString();
        document.getElementById('pps-val').innerText = state.pps.toLocaleString();
        updateLevelBar();
        renderShop();
    }

    function renderShop() {
        renderList('cars-list', items.cars);
        renderList('biz-list', items.biz);
        renderList('prop-list', items.prop);
    }

    function renderList(containerId, list) {
        const cont = document.getElementById(containerId);
        cont.innerHTML = '';
        list.forEach(item => {
            const isBought = state.inventory.includes(item.id);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-info">
                    <h4>${item.n}</h4>
                    <p>${item.p.toLocaleString()} ֏ | +${item.v.toLocaleString()}/վրկ</p>
                </div>
                <button class="buy-btn ${isBought ? 'bought' : ''}" 
                    onclick="buy('${item.id}', ${item.p}, ${item.v})" 
                    ${(state.bal < item.p || isBought) ? 'disabled' : ''}>
                    ${isBought ? 'Գնված' : 'Գնել'}
                </button>
            `;
            cont.appendChild(card);
        });
    }

    function buy(id, price, val) {
        if(state.bal >= price && !state.inventory.includes(id)) {
            state.bal -= price;
            state.pps += val;
            state.inventory.push(id);
            updateUI(); save();
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function startTask() {
        tg.openTelegramLink('https://t.me/drammasternews');
        if(state.tasks.includes('sub')) return;
        setTimeout(() => {
            state.bal += 10000;
            state.tasks.push('sub');
            updateUI();
            alert("10,000 ֏ ավելացվեց!");
        }, 5000);
    }

    function inviteFriend() {
        tg.openTelegramLink('https://t.me/share/url?url=https://t.me/your_bot&text=Միացիր!');
        setTimeout(() => { state.bal += 5000; updateUI(); }, 3000);
    }

    function navTo(s) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(s + '-screen').classList.add('active');
        event.currentTarget.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    function save() { localStorage.setItem('dm_empire_v1', JSON.stringify(state)); }
    
    window.onload = function() {
        const s = localStorage.getItem('dm_empire_v1');
        if(s) {
            state = JSON.parse(s);
            if(state.name) initUI();
            else document.getElementById('welcome-screen').classList.add('active');
        } else {
            document.getElementById('welcome-screen').classList.add('active');
        }
    };
</script>
</body>
</html>

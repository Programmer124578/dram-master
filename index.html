<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dram Master Pro</title>
    <style>
        body { background: #000b1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 2px solid #1a3a5a; }
        
        .progress-container { width: 80%; background: #1a3a5a; height: 8px; border-radius: 4px; margin: 8px auto; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s; }
        
        #score { font-size: 40px; color: #ffcc00; font-weight: bold; }
        #level-info { color: #00ffcc; font-size: 14px; font-weight: bold; }

        .tab { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-tab { display: flex; flex-direction: column; }

        /* Սեղմելու կոճակը՝ բարձր և ֏ նշանով */
        #main { justify-content: center; align-items: center; }
        #coin-btn {
            width: 240px; height: 240px;
            background: radial-gradient(circle, #ffcc00 0%, #cc9900 100%);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 100px; font-weight: bold; color: #5c4400;
            box-shadow: 0 0 40px rgba(255,204,0,0.4), inset 0 0 20px rgba(0,0,0,0.2);
            cursor: pointer; transition: 0.1s; user-select: none;
            border: 8px solid #b38600;
        }
        #coin-btn:active { transform: scale(0.9); box-shadow: 0 0 20px rgba(255,204,0,0.6); }

        .item { background: #0a192f; display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 12px; border: 1px solid #1e2d44; }
        button.buy-btn { background: #0088cc; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #051024; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #1a3a5a; }
        .nav button { background: none; border: none; color: white; font-size: 11px; display: flex; flex-direction: column; align-items: center; opacity: 0.5; }
        .nav button.active { opacity: 1; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <div id="level-info">Level 1</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="score">0 ֏</div>
        <div id="income" style="font-size: 13px; color: #00ffcc;">+0/վրկ</div>
    </div>

    <div id="main" class="tab active-tab">
        <div id="coin-btn">֏</div>
    </div>

    <div id="cars" class="tab">
        <div class="item"><span>🚗 Opel Vectra (10k)</span><button class="buy-btn" onclick="buy(10000, 2)">Գնել</button></div>
        <div class="item"><span>🚘 Mercedes G550 (50k)</span><button class="buy-btn" onclick="buy(50000, 10)">Գնել</button></div>
        <div class="item"><span>🏎️ BMW M5 F90 (100k)</span><button class="buy-btn" onclick="buy(100000, 25)">Գնել</button></div>
    </div>

    <div id="houses" class="tab">
        <div class="item"><span>🏠 1 սենյակ (20k)</span><button class="buy-btn" onclick="buy(20000, 5)">Գնել</button></div>
        <div class="item"><span>🏘️ 3 սենյակ (60k)</span><button class="buy-btn" onclick="buy(60000, 15)">Գնել</button></div>
    </div>

    <div class="nav">
        <button id="n-main" class="active" onclick="showTab('main', 'n-main')"><span>🪙</span>Խաղալ</button>
        <button id="n-cars" onclick="showTab('cars', 'n-cars')"><span>🚗</span>Մեքենա</button>
        <button id="n-houses" onclick="showTab('houses', 'n-houses')"><span>🏠</span>Տուն</button>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('dm_score')) || 0;
        let passive = parseInt(localStorage.getItem('dm_passive')) || 0;
        let maxS = parseInt(localStorage.getItem('dm_max')) || 0;

        function update() {
            if (score > maxS) { maxS = score; localStorage.setItem('dm_max', maxS); }
            let level = maxS >= 1000000 ? 5 : maxS >= 150000 ? 4 : maxS >= 50000 ? 3 : maxS >= 1000 ? 2 : 1;
            let click = [1, 5, 20, 100, 500][level-1];
            let target = [1000, 50000, 150000, 1000000, 10000000][level-1];
            let prev = level > 1 ? [0, 1000, 50000, 150000, 1000000][level-1] : 0;

            document.getElementById('progress-bar').style.width = Math.min(((maxS - prev) / (target - prev)) * 100, 100) + "%";
            document.getElementById('level-info').textContent = "Level " + level + " (" + click + "֏/click)";
            document.getElementById('score').textContent = Math.floor(score).toLocaleString() + " ֏";
            document.getElementById('income').textContent = "+" + passive + "/վրկ";
            localStorage.setItem('dm_score', score);
            localStorage.setItem('dm_passive', passive);
        }

        document.getElementById('coin-btn').onclick = () => { 
            let level = maxS >= 1000000 ? 5 : maxS >= 150000 ? 4 : maxS >= 50000 ? 3 : maxS >= 1000 ? 2 : 1;
            score += [1, 5, 20, 100, 500][level-1]; 
            update(); 
        };

        function buy(p, pr) { if (score >= p) { score -= p; passive += pr; update(); } else alert("Փող չկա!"); }
        function showTab(id, b) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(b).classList.add('active');
        }

        setInterval(() => { if(passive > 0) { score += passive; update(); } }, 1000);
        update();
    </script>
</body>
</html>

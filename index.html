<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro | Deluxe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        /* ԴԻԶԱՅՆԸ ՄՆՈՒՄ Է ՆՈՒՅՆԸ, ԻՆՉ ՆԱԽՈՐԴ ՏԱՐԲԵՐԱԿՈՒՄ */
        :root { --gold: #F59E0B; --gold-light: #FCD34D; --bg: #0F172A; --card-bg: #1E293B; --mint: #10B981; --text: #F8FAFC; --accent: #3B82F6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        .header { padding: 20px 15px 15px; background: rgba(30,41,59,0.9); border-bottom: 1px solid #334155; text-align: center; }
        .balance-val { font-size: 38px; font-weight: 900; color: var(--gold-light); }
        .stats { display: flex; justify-content: space-between; font-size: 14px; color: #94A3B8; margin-top: 10px; font-weight: bold; }
        .lvl-cont { width: 100%; height: 22px; background: #0F172A; border-radius: 12px; margin-top: 15px; overflow: hidden; position: relative; border: 1px solid #334155; }
        .lvl-fill { height: 100%; background: linear-gradient(90deg, #D97706, #FBBF24); width: 0%; transition: width 0.4s ease; }
        .lvl-txt { position: absolute; top: 0; width: 100%; text-align: center; font-size: 12px; line-height: 22px; font-weight: 800; color: #fff; }
        .screen { display: none; padding: 15px; height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: block; }
        .coin-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-coin { width: 240px; height: 240px; background: radial-gradient(circle at 30% 30%, #FCD34D, #B45309); border-radius: 50%; border: 10px solid #78350F; display: flex; align-items: center; justify-content: center; font-size: 90px; color: #451A03; font-weight: 900; cursor: pointer; transition: transform 0.05s; }
        .main-coin:active { transform: scale(0.92); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; }
        .tab-btn { flex: 1; padding: 12px 5px; background: #334155; border: none; color: #CBD5E1; border-radius: 10px; font-size: 13px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .card { background: var(--card-bg); border-radius: 14px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .card-info b { color: var(--text); display: block; font-size: 15px; margin-bottom: 4px; }
        .card-info small { color: #94A3B8; font-size: 12px; display: block; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; }
        .buy-btn:disabled { background: #334155; color: #64748B; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(30,41,59,0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-btn { background: none; border: none; color: #64748B; font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--gold-light); transform: translateY(-3px); }
        .float { position: absolute; color: #fff; font-weight: 900; font-size: 28px; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 50; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-val" id="bal">Բեռնվում է...</div>
        <div class="stats"><span id="inc">0 ֏/վ</span><span id="energy">⚡ 500/500</span></div>
        <div class="lvl-cont"><div class="lvl-fill" id="lvl-fill"></div><div class="lvl-txt" id="lvl-txt">Լևլ 1</div></div>
    </div>

    <div id="game" class="screen active">
        <div class="coin-area"><div class="main-coin" id="coin">֏</div></div>
    </div>

    <div id="shop" class="screen">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('house')">🏠 Գույք</button>
            <button class="tab-btn" onclick="setTab('car')">🚗 Մեքենա</button>
        </div>
        <div id="shop-list"></div>
    </div>

    <div id="tasks" class="screen">
        <div class="card"><div class="card-info"><b>🔗 Հրավիրել Ընկեր</b><small>+5,000 ֏</small></div><button class="buy-btn" onclick="inviteFriend()">Հրավիրել</button></div>
        <div class="card"><div class="card-info"><b>💰 Դիտել Գովազդ</b><small>+10,000 ֏</small></div><button class="buy-btn" onclick="watchAd()">Դիտել</button></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="nav('game', this)"><span>🪙</span>Խաղալ</button>
        <button class="nav-btn" onclick="nav('shop', this)"><span>🛒</span>Խանութ</button>
        <button class="nav-btn" onclick="nav('tasks', this)"><span>🎁</span>Պարգևներ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ՔՈ ՍԵՐՎԵՐԻ ՀԱՍՑԵՆ (Կլրացնենք երբ սերվերը գործարկենք Render-ում)
        const SERVER_URL = 'https://dram-master-api.onrender.com'; 
        
        // Ստանում ենք օգտատիրոջ ID-ն տելեգրամից
        const userId = tg.initDataUnsafe?.user?.id || 12345; // 12345-ը թեստի համար է

        let state = { bal: 0, inc: 0, energy: 500, lvl: 1 };
        let clickQueue = 0; // Քանի անգամ է սեղմել, որ ուղարկենք սերվեր

        // 1. Սերվերից բեռնում ենք խաղացողի իրական տվյալները
        async function loadData() {
            try {
                const res = await fetch(`${SERVER_URL}/api/user/${userId}`);
                const data = await res.json();
                state.bal = data.bal;
                state.inc = data.inc;
                updateUI();
            } catch (err) {
                console.log("Սերվերի հետ կապ չկա, աշխատում ենք լոկալ");
                // Լոկալ պահուստավորում (եթե սերվերը անջատված է)
                state.bal = parseInt(localStorage.getItem('bal')) || 0;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/վ';
        }

        // 2. Քլիքի համակարգը (հավաքում ենք սեղմումները և ամեն 2 վրկ-ն մեկ ուղարկում սերվեր)
        document.getElementById('coin').addEventListener('pointerdown', (e) => {
            if(state.energy < 1) return;
            state.energy--;
            
            let earn = 1; // Սա պետք է գա քո config-ից (լևլից կախված)
            state.bal += earn;
            clickQueue += earn; 
            
            let f = document.createElement('div'); f.className = 'float'; 
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            f.style.left = clientX + 'px'; f.style.top = clientY + 'px'; 
            f.innerText = '+' + earn; document.body.appendChild(f); 
            setTimeout(() => f.remove(), 800);
            updateUI();
        });

        // 3. Սինխրոնիզացիա սերվերի հետ
        setInterval(async () => {
            if (clickQueue > 0) {
                let toSend = clickQueue;
                clickQueue = 0; // զրոյացնում ենք
                try {
                    await fetch(`${SERVER_URL}/api/sync`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, earned: toSend })
                    });
                } catch(e) {
                    clickQueue += toSend; // եթե սխալ եղավ, հետ ենք վերադարձնում պարտքը
                }
            }
            localStorage.setItem('bal', state.bal); // լոկալ պահուստ
        }, 2000);

        function inviteFriend() {
            const botUsername = "ՔՈ_ԲՈՏԻ_ԱՆՈՒՆԸ_bot";
            const inviteLink = `https://t.me/${botUsername}?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${inviteLink}&text=Արի խաղանք և գումար վաստակենք!`);
        }

        function nav(s, b) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active'); b.classList.add('active');
        }

        loadData();
    </script>
</body>
</html>

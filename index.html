<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro - MultiLang</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root { --gold: #FFD700; --bg-dark: #050608; --glass: rgba(255, 255, 255, 0.05); --neon-blue: #00f3ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: radial-gradient(circle at top, #11131c, var(--bg-dark)); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; user-select: none; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #171924; padding: 25px; border-radius: 24px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; }
        .modal-btn { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 10px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .modal-btn:active { transform: scale(0.95); }

        .header { padding: 15px; background: rgba(5,6,8,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.15); text-align: center; }
        .balance-val { font-size: 42px; font-weight: 900; color: var(--gold); margin: 10px 0; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        
        .screen { display: none; padding: 15px 15px 100px; height: calc(100vh - 180px); overflow-y: auto; }
        .screen.active { display: block; }

        .streak-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .day-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 5px; text-align: center; font-size: 12px; transition: 0.3s; position: relative; }
        .day-card.active { border-color: var(--gold); background: rgba(255,215,0,0.15); cursor: pointer; }
        .day-card.claimed { opacity: 0.4; filter: grayscale(1); }

        .coin-area { height: 60%; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-coin { width: 260px; height: 260px; background: radial-gradient(circle, #ffd700, #d4af37, #b8860b); border-radius: 50%; box-shadow: 0 10px 40px rgba(255,215,0,0.3), inset 0 -10px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 120px; cursor: pointer; transition: transform 0.05s ease; border: 4px solid #fff3a0; }
        .main-coin:active { transform: scale(0.9); }

        .card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); border-radius: 18px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.08); }
        .card-info b { display: block; font-size: 15px; margin-bottom: 5px; color: #fff; }
        .card-info span { color: var(--gold); font-weight: 800; font-size: 13px; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 12px 18px; border-radius: 12px; font-weight: 900; font-size: 13px; cursor: pointer; }
        .buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .section-title { font-size: 20px; font-weight: 900; margin: 25px 0 15px; color: #fff; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 5px; height: 20px; background: var(--gold); margin-right: 12px; border-radius: 3px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0b10; display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-btn { background: none; border: none; color: #666; font-size: 12px; font-weight: 800; display: flex; flex-direction: column; align-items: center; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { color: var(--gold); transform: translateY(-3px); }
        .nav-btn i { font-size: 26px; font-style: normal; margin-bottom: 5px; }

        .float-text { position: absolute; font-weight: 900; font-size: 36px; color: #fff; text-shadow: 0 0 10px var(--gold); pointer-events: none; animation: float 0.8s ease-out forwards; z-index: 1000; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.2); } }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--gold); margin-bottom:12px; font-size:24px;"></h2>
            <p id="modal-text" style="margin-bottom:20px; font-size:15px; color:#ddd; line-height:1.4;"></p>
            <div id="modal-actions"></div>
        </div>
    </div>

    <div class="header">
        <div style="display:flex; justify-content: space-between; font-size:13px; color:#aaa; font-weight:800;">
            <span id="lvl-txt">LEVEL 1</span>
            <span id="lang-btn" onclick="toggleLang()" style="cursor:pointer; color:var(--gold); background:rgba(255,215,0,0.1); padding:4px 8px; border-radius:8px;">🇦🇲 HY</span>
        </div>
        <div class="balance-val" id="bal">0 ֏</div>
        <div style="display:flex; justify-content: space-between; font-size:14px; font-weight:700;">
            <span id="inc">0 ֏/s</span>
            <span id="energy">⚡ 1000/1000</span>
        </div>
    </div>

    <div id="game" class="screen active">
        <h3 class="section-title" id="t-daily">📅 Օրական Բոնուս</h3>
        <div class="streak-container" id="streak-cont"></div>
        
        <div class="coin-area">
            <div class="main-coin" id="coin">֏</div>
        </div>
    </div>

    <div id="shop" class="screen">
        <h3 class="section-title" id="t-shop-title">🛒 Բիզնեսներ (Պասիվ եկամուտ)</h3>
        <div id="shop-list"></div>
    </div>

    <div id="tasks" class="screen">
        <h3 class="section-title" id="t-friends">👥 Հրավիրել Ընկերների</h3>
        <div class="card" style="border-color: var(--neon-blue);">
            <div class="card-info"><b id="t-invite-title">Հրավիրել և Վաստակել</b><span id="t-invite-reward">+50,000 ֏ յուրաքանչյուրի համար</span></div>
            <button class="buy-btn" style="background: var(--neon-blue);" onclick="shareRef()" id="t-invite-btn">Հրավիրել</button>
        </div>

        <h3 class="section-title" id="t-ads-title">🚀 Գովազդային Պարգևներ</h3>
        <div id="ads-list"></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="nav('game', this)"><i id="n-play-i">🪙</i><span id="n-play">Խաղալ</span></button>
        <button class="nav-btn" onclick="nav('shop', this)"><i id="n-shop-i">🛒</i><span id="n-shop">Խանութ</span></button>
        <button class="nav-btn" onclick="nav('tasks', this)"><i id="n-tasks-i">🎁</i><span id="n-tasks">Պարգևներ</span></button>
    </div>

    <script>
        const MY_ADSGRAM_BLOCK_ID = "26344"; 
        const tg = window.Telegram.WebApp; 
        tg.expand();

        let AdController = null;
        try { AdController = window.Adsgram.init({ blockId: 26344 }); } catch(e) {}

        let state = {
            bal: 0, inc: 0, energy: 1000, maxE: 1000, 
            streak: 0, lastClaim: 0, adCounts: {}, lastTime: Date.now(),
            lang: 'hy' // Նախնական լեզուն հայերենն է
        };

        // Բառարան 3 լեզուների համար
        const i18n = {
            hy: {
                flag: "🇦🇲 HY", daily: "📅 Օրական Բոնուս", shopTitle: "🛒 Բիզնեսներ (Պասիվ եկամուտ)", 
                friends: "👥 Հրավիրել Ընկերների", invTitle: "Հրավիրել և Վաստակել", invReward: "+50,000 ֏ յուրաքանչյուրի համար",
                invBtn: "Հրավիրել", adsTitle: "🚀 Գովազդային Պարգևներ", play: "Խաղալ", shop: "Խանութ", tasks: "Պարգևներ",
                day: "Օր", buy: "Գնել", watch: "Դիտել", reqAd: "Պահանջվում է", adDone: "Արված է", sec: "վրկ",
                close: "Լավ", loading: "Բեռնում...", searching: "Փնտրում ենք գովազդ... Խնդրում ենք սպասել:",
                noAds: "Այս պահին գովազդ չկա 😔", noAdsText: "Այս պահին հասանելի գովազդներ չեն գտնվել: Խնդրում ենք փորձել մի փոքր ուշ կամ միացնել VPN:",
                energyEmpty: "Էներգիան Սպառվեց 🔋", energyPrompt: "Ցանկանո՞ւմ ես դիտել 1 կարճ գովազդ և ամբողջությամբ լիցքավորել էներգիան:",
                btnWatch: "🎥 Դիտել Գովազդ", btnLater: "Ոչ հիմա",
                items: ['Ավտոմատ Քլիքեր', 'Փոքր Բիզնես', 'Սրճարան', 'Ռեստորան', 'Խանութների Ցանց', 'Գործարան', 'Բանկ', 'Նավթային Ընկերություն']
            },
            ru: {
                flag: "🇷🇺 RU", daily: "📅 Ежедневный Бонус", shopTitle: "🛒 Бизнесы (Пассивный доход)", 
                friends: "👥 Пригласить Друзей", invTitle: "Пригласи и Заработай", invReward: "+50,000 ֏ за каждого",
                invBtn: "Пригласить", adsTitle: "🚀 Рекламные Награды", play: "Играть", shop: "Магазин", tasks: "Награды",
                day: "День", buy: "Купить", watch: "Смотреть", reqAd: "Требуется", adDone: "Сделано", sec: "сек",
                close: "ОК", loading: "Загрузка...", searching: "Ищем рекламу... Пожалуйста, подождите:",
                noAds: "Сейчас нет рекламы 😔", noAdsText: "На данный момент реклама недоступна. Попробуйте позже или включите VPN.",
                energyEmpty: "Энергия закончилась 🔋", energyPrompt: "Хотите посмотреть рекламу и полностью восстановить энергию?",
                btnWatch: "🎥 Смотреть", btnLater: "Позже",
                items: ['Автокликер', 'Малый Бизнес', 'Кафе', 'Ресторан', 'Сеть Магазинов', 'Завод', 'Банк', 'Нефтяная Компания']
            },
            en: {
                flag: "🇬🇧 EN", daily: "📅 Daily Bonus", shopTitle: "🛒 Businesses (Passive Income)", 
                friends: "👥 Invite Friends", invTitle: "Invite & Earn", invReward: "+50,000 ֏ for each",
                invBtn: "Invite", adsTitle: "🚀 Ad Rewards", play: "Play", shop: "Shop", tasks: "Rewards",
                day: "Day", buy: "Buy", watch: "Watch", reqAd: "Requires", adDone: "Done", sec: "sec",
                close: "OK", loading: "Loading...", searching: "Searching for ads... Please wait:",
                noAds: "No ads right now 😔", noAdsText: "No ads are currently available. Please try again later or turn on a VPN.",
                energyEmpty: "Out of Energy 🔋", energyPrompt: "Do you want to watch a short ad to fully refill your energy?",
                btnWatch: "🎥 Watch Ad", btnLater: "Not now",
                items: ['Auto Clicker', 'Small Business', 'Cafe', 'Restaurant', 'Retail Chain', 'Factory', 'Bank', 'Oil Company']
            }
        };

        const STREAK_REWARDS = [1000, 5000, 15000, 50000, 200000, 1000000, 10000000];
        const ADS_CONFIG = [
            { id: 'ad1', n: 'Միկրո Դրամ', r: 1000, req: 1 },
            { id: 'ad2', n: 'Փոքր Դրամ', r: 2500, req: 1 },
            { id: 'ad3', n: 'Միջին Դրամ', r: 5000, req: 2 },
            { id: 'ad4', n: 'Լավ Դրամ', r: 10000, req: 2 },
            { id: 'ad5', n: 'Մեծ Դրամ', r: 25000, req: 3 },
            { id: 'ad6', n: 'Խոշոր Դրամ', r: 50000, req: 5 },
            { id: 'ad11', n: 'Էներգիա +100', type: 'energy', val: 100, req: 1 },
            { id: 'ad12', n: 'Էներգիա +250', type: 'energy', val: 250, req: 1 },
            { id: 'ad14', n: 'Ամբողջական Էներգիա', type: 'full_energy', req: 3 },
            { id: 'ad15', n: 'Բազմապատկիչ x2', type: 'double', req: 5 },
            { id: 'ad17', n: 'Բրոնզե Արկղ', type: 'box', val: 20000, req: 3 }
        ];

        const SHOP_BASE = [
            { p: 500, i: 2 }, { p: 2500, i: 10 }, { p: 15000, i: 50 }, { p: 50000, i: 200 },
            { p: 250000, i: 1000 }, { p: 1000000, i: 5000 }, { p: 5000000, i: 30000 }, { p: 25000000, i: 200000 }
        ];

        function toggleLang() {
            const langs = ['hy', 'ru', 'en'];
            let currentIdx = langs.indexOf(state.lang);
            state.lang = langs[(currentIdx + 1) % langs.length];
            applyTranslations();
            save();
        }

        function applyTranslations() {
            const t = i18n[state.lang];
            document.getElementById('lang-btn').innerText = t.flag;
            document.getElementById('t-daily').innerText = t.daily;
            document.getElementById('t-shop-title').innerText = t.shopTitle;
            document.getElementById('t-friends').innerText = t.friends;
            document.getElementById('t-invite-title').innerText = t.invTitle;
            document.getElementById('t-invite-reward').innerText = t.invReward;
            document.getElementById('t-invite-btn').innerText = t.invBtn;
            document.getElementById('t-ads-title').innerText = t.adsTitle;
            document.getElementById('n-play').innerText = t.play;
            document.getElementById('n-shop').innerText = t.shop;
            document.getElementById('n-tasks').innerText = t.tasks;
            
            initStreak();
            renderShop();
            renderAds();
        }

        function initStreak() {
            const cont = document.getElementById('streak-cont');
            cont.innerHTML = '';
            const now = Date.now();
            const t = i18n[state.lang];
            for(let i=0; i<7; i++) {
                const canClaim = (i === state.streak) && (now - state.lastClaim > 86400000);
                const isClaimed = i < state.streak;
                const div = document.createElement('div');
                div.className = `day-card ${canClaim ? 'active' : ''} ${isClaimed ? 'claimed' : ''}`;
                div.innerHTML = `<b>${t.day} ${i+1}</b><br>${STREAK_REWARDS[i].toLocaleString()}`;
                if(canClaim) div.onclick = () => claimStreak(i);
                cont.appendChild(div);
            }
        }

        function claimStreak(day) {
            state.bal += STREAK_REWARDS[day];
            state.streak = (state.streak + 1) % 7;
            state.lastClaim = Date.now();
            save(); updateUI(); initStreak();
            showModal("Շնորհավոր!", `+${STREAK_REWARDS[day].toLocaleString()} ֏`);
        }

        function renderShop() {
            const cont = document.getElementById('shop-list');
            cont.innerHTML = '';
            const t = i18n[state.lang];
            SHOP_BASE.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-info"><b>${t.items[idx]}</b><span>+${item.i.toLocaleString()} ֏/${t.sec}</span></div>
                    <button class="buy-btn" onclick="buy(${idx})" ${state.bal < item.p ? 'disabled' : ''}>${item.p.toLocaleString()} ֏</button>
                `;
                cont.appendChild(div);
            });
        }

        function renderAds() {
            const cont = document.getElementById('ads-list');
            cont.innerHTML = '';
            const t = i18n[state.lang];
            ADS_CONFIG.forEach(ad => {
                const count = state.adCounts[ad.id] || 0;
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-info"><b>${ad.n}</b><span>${t.reqAd} ${ad.req} (${t.adDone}: ${count}/${ad.req})</span></div>
                    <button class="buy-btn" onclick="watchAd('${ad.id}')">${t.watch}</button>
                `;
                cont.appendChild(div);
            });
        }

        async function watchAd(id) {
            const t = i18n[state.lang];
            if(!AdController) return showModal("Սխալ", "Անջատված է / Offline");
            showModal(t.loading, t.searching, "");
            
            try {
                const res = await AdController.show();
                hideModal();
                if(res.done) {
                    state.adCounts[id] = (state.adCounts[id] || 0) + 1;
                    const ad = ADS_CONFIG.find(a => a.id === id);
                    if(state.adCounts[id] >= ad.req) {
                        applyAdReward(ad);
                        state.adCounts[id] = 0;
                    } else {
                        save(); updateUI(); renderAds();
                        showModal("Արձանագրվեց!", `Մնաց ${ad.req - state.adCounts[id]}`);
                    }
                }
            } catch(e) {
                hideModal();
                showModal(t.noAds, t.noAdsText);
            }
        }

        function applyAdReward(ad) {
            if(ad.r) state.bal += ad.r;
            if(ad.type === 'energy') state.energy = Math.min(state.maxE, state.energy + ad.val);
            if(ad.type === 'full_energy') state.energy = state.maxE;
            if(ad.type === 'double') state.bal *= 2;
            if(ad.type === 'box') state.bal += ad.val;
            showModal("Պարգև!", `Ակտիվացված է:`);
            save(); updateUI(); renderAds();
        }

        function buy(idx) {
            const item = SHOP_BASE[idx];
            if(state.bal >= item.p) {
                state.bal -= item.p;
                state.inc += item.i;
                save(); updateUI(); renderShop();
            }
        }

        function handleTap(e) {
            e.preventDefault();
            const touches = e.changedTouches;
            const t = i18n[state.lang];
            for(let i=0; i<touches.length; i++) {
                if(state.energy >= 1) {
                    state.energy--;
                    state.bal += 1;
                    spawnText(touches[i].clientX, touches[i].clientY, "+1");
                } else {
                    showModal(t.energyEmpty, t.energyPrompt, `<button class="modal-btn" onclick="refillEnergyAd()">${t.btnWatch}</button><button class="modal-btn" style="background:#333;color:#fff;" onclick="hideModal()">${t.btnLater}</button>`);
                    break;
                }
            }
            updateUI();
        }

        async function refillEnergyAd() {
            if(!AdController) return;
            const t = i18n[state.lang];
            try {
                const res = await AdController.show();
                hideModal();
                if(res.done) { 
                    state.energy = state.maxE; 
                    updateUI(); save(); 
                }
            } catch(e) {
                hideModal();
                showModal(t.noAds, t.noAdsText);
            }
        }

        function shareRef() {
            const refLink = `https://t.me/YOUR_BOT_USERNAME?start=${tg.initDataUnsafe?.user?.id || 'TEST_ID'}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=Միացիր ինձ!`);
        }

        function spawnText(x, y, txt) {
            const el = document.createElement('div'); el.className = 'float-text'; el.innerText = txt;
            el.style.left = `${x - 20}px`; el.style.top = `${y - 20}px`;
            document.body.appendChild(el); setTimeout(() => el.remove(), 800);
        }

        function showModal(title, text, action) {
            const t = i18n[state.lang];
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-actions').innerHTML = action || `<button class="modal-btn" onclick="hideModal()">${t.close}</button>`;
            document.getElementById('modal-overlay').classList.add('show');
        }
        function hideModal() { document.getElementById('modal-overlay').classList.remove('show'); }

        function nav(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tasks') renderAds();
            if(id === 'shop') renderShop();
        }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ` ֏/${t.sec}`;
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
        }

        function save() { 
            state.lastTime = Date.now();
            localStorage.setItem('dram_master_pro_v7', JSON.stringify(state)); 
        }
        
        function load() {
            const s = localStorage.getItem('dram_master_pro_v7');
            if(s) {
                let savedState = JSON.parse(s);
                state = { ...state, ...savedState };
                if (state.lastTime) {
                    const elapsedSecs = Math.floor((Date.now() - state.lastTime) / 1000);
                    state.energy = Math.min(state.maxE, state.energy + Math.floor(elapsedSecs / 2));
                    const validSecs = Math.min(elapsedSecs, 86400);
                    if(state.inc > 0 && validSecs > 0) state.bal += state.inc * validSecs;
                }
            }
            applyTranslations();
            updateUI(); 
        }

        document.getElementById('coin').addEventListener('touchstart', handleTap, {passive: false});
        setInterval(() => { 
            state.bal += state.inc / 10; 
            if(state.energy < state.maxE) state.energy += 0.05; 
            updateUI(); 
        }, 100);
        setInterval(save, 5000);
        window.onload = load;
    </script>
</body>
</html>

        .modal-box { background: linear-gradient(145deg, #1e202e, #14151f); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,215,0,0.3); width: 85%; max-width: 320px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.3s; }

        .modal-title { color: var(--gold); font-size: 22px; font-weight: 900; margin-bottom: 10px; }
        .modal-text { font-size: 14px; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
        .modal-btn { background: linear-gradient(135deg, var(--gold), #ff8c00); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 14px; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .modal-btn-close { background: transparent; color: #888; border: 1px solid #444; padding: 10px 20px; border-radius: 12px; font-weight: bold; font-size: 13px; width: 100%; cursor: pointer; }

        .header { padding: 15px; background: rgba(10, 11, 16, 0.9); backdrop-filter: blur(15px); text-align: center; border-bottom: 1px solid rgba(255,215,0,0.15); position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        .lvl-cont { width: 100%; height: 26px; background: rgba(0,0,0,0.8); border-radius: 13px; margin: 0 auto 15px; position: relative; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .lvl-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #b8860b, #ffd700, #ff8c00); width: 0%; transition: width 0.3s ease; }
        .lvl-txt { position: relative; z-index: 10; font-size: 12px; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        .balance-val { font-size: 42px; font-weight: 900; color: var(--gold); text-shadow: 0 4px 15px rgba(255,215,0,0.4); margin: 5px 0; }
        .stats { display: flex; justify-content: space-between; font-size: 13px; color: #a0a0a0; font-weight: 700; padding: 0 5px; }
        
        .screen { display: none; padding: 20px 15px 95px; height: calc(100vh - 180px); overflow-y: auto; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .coin-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-coin { width: 250px; height: 250px; background: radial-gradient(circle at 30% 30%, #fff9c4, #ffd700, #996515); border-radius: 50%; border: 8px solid #6b4c0a; display: flex; align-items: center; justify-content: center; font-size: 110px; color: #4a3600; cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transition: transform 0.05s; touch-action: manipulation; }
        .main-coin:active { transform: scale(0.95); }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg-dark); padding: 10px 0; z-index: 500; }
        .tab-btn { flex: 1; padding: 14px 5px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); color: #aaa; border-radius: 14px; font-size: 12px; font-weight: 800; }
        .tab-btn.active { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }

        .card { background: rgba(25, 27, 38, 0.7); backdrop-filter: blur(10px); border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .card-info b { color: var(--gold); font-size: 15px; display: block; margin-bottom: 6px; }

        .buy-btn.bought { background: #333; color: #fff; }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 11, 16, 0.95); display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }

        .nav-btn.active { color: var(--gold); }

        .float-text { position: absolute; font-weight: 900; font-size: 32px; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 2000; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        .section-title { color: #fff; font-size: 18px; margin: 25px 0 15px; border-left: 4px solid var(--gold); padding-left: 10px; font-weight: 900; }
    </style>
</head>

                    if ((type === 'x2c' || type === 'x3c') && state.multExpiry > now) {
                        let diff = Math.ceil((state.multExpiry - now) / 1000);
                        btn.innerText = `${t.btnBought} (${diff}s)`; btn.disabled = true; btn.className = "buy-btn bought";
                    } else {
                        btn.innerText = `${t.watch} (${count}/${req})`; btn.disabled = false; btn.className = "buy-btn";
                    }
                }
            });
        }

        function applyLang() {
            let t = dict[state.lang];
            let flag = { hy: '🇦🇲 HY', en: '🇬🇧 EN', ru: '🇷🇺 RU' };
            document.getElementById('lang-btn').innerText = flag[state.lang];
            
            document.getElementById('btn-house').innerText = t.h;
            document.getElementById('btn-car').innerText = t.c;
            document.getElementById('btn-biz').innerText = t.b;
            document.getElementById('n-game').innerText = t.nGame;
            document.getElementById('n-shop').innerText = t.nShop;
            document.getElementById('n-tasks').innerText = t.nTasks;
            
            document.getElementById('t-social').innerText = t.tsoc;
            document.getElementById('t-news').innerText = t.tnews;
            document.getElementById('t-invite').innerText = t.tinv;
            document.getElementById('t-ads-section').innerText = t.tads;
            
            document.getElementById('t-r1k').innerText = t.tr1k;
            document.getElementById('t-r5k').innerText = t.tr5k;
            document.getElementById('t-mystery').innerText = t.tmystery;
            document.getElementById('t-double').innerText = t.tdouble;
            document.getElementById('t-x2c').innerText = t.tx2c;
            document.getElementById('t-x3c').innerText = t.tx3c;
            
            document.getElementById('s-x2c').innerText = t.min5;
            document.getElementById('s-x3c').innerText = t.min5;

            if(state.tgSub) { document.getElementById('btn-tg').innerText = t.done; }
            else { document.getElementById('btn-tg').innerText = t.btnBuy; }
            document.getElementById('btn-inv').innerText = t.btnBuy;
            
            updateTasksUI(); update();
        }

        function showModal(title, text, btnText, onBtnClick) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            let actions = document.getElementById('modal-actions');
            actions.innerHTML = '';
            
            if(btnText) {
                let mainBtn = document.createElement('button'); mainBtn.className = 'modal-btn';
                mainBtn.innerText = btnText; mainBtn.onclick = onBtnClick; actions.appendChild(mainBtn);
            }
            
            let closeBtn = document.createElement('button'); closeBtn.className = 'modal-btn-close';
            closeBtn.innerText = dict[state.lang].close; 
            closeBtn.onclick = () => document.getElementById('modal-overlay').classList.remove('show');
            actions.appendChild(closeBtn);
            
            document.getElementById('modal-overlay').classList.add('show');
        }

        // --- ՈՒՂՂՎԱԾ ՖՈՒՆԿՑԻԱ ---
        function playDirectAd(onSuccess) {
            if (!AdController && window.Adsgram) {
                try { AdController = window.Adsgram.init({ blockId: "26119" }); } catch(e) {}
            }
            
            if (!AdController) {
                tg.showAlert(dict[state.lang].adMsg || "Գովազդը բեռնվում է...");
                return;
            }
            
            AdController.show().then(() => { 
                onSuccess(); 
            }).catch((e) => {
                let err = state.lang === 'hy' ? "Գովազդ այս պահին չկա, կամ փակել եք այն: Փորձեք մի փոքր ուշ:" : 
                         (state.lang === 'ru' ? "Рекламы пока нет, или вы ее закрыли. Попробуйте позже." : 
                         "No ads available right now, or you closed it. Try again later.");
                tg.showAlert(err);
            });
        }
        // ------------------------

        function update() {
            let current = levels[0];
            for(let lv of levels) { if(state.bal >= lv.m) current = lv; }
            state.lvl = current.l; state.maxE = current.e;

            document.getElementById('bal').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('inc').innerText = state.inc.toLocaleString() + ' ֏/s';
            document.getElementById('energy').innerText = `⚡ ${Math.floor(state.energy)}/${state.maxE}`;
            
            let nxt = levels.find(x => x.l === current.l + 1);
            let prg = nxt ? ((state.bal - current.m) / (nxt.m - current.m)) * 100 : 100;
            document.getElementById('lvl-fill').style.width = Math.min(prg, 100) + '%';
            document.getElementById('lvl-txt').innerText = `${dict[state.lang].lvlText} ${current.l} (${current.n[state.lang]}) | ${Math.floor(prg)}%`;
        }

        function checkDailyBonus() {
            let now = Date.now();
            let diff = now - state.lastDaily;
            if (diff > 86400000) {
                if (diff > 172800000) { state.streak = 1; state.dailyAdDone = 0; }
                let config = dailyConfig[state.streak];
                let remainingAds = config.ads - state.dailyAdDone;
                
                let t = dict[state.lang];
                let title = state.lang === 'hy' ? `🎁 Օր ${state.streak}-ի Բոնուս` : (state.lang === 'ru' ? `🎁 Бонус дня ${state.streak}` : `🎁 Day ${state.streak} Bonus`);
                let desc = state.lang === 'hy' 
                    ? (remainingAds > 0 ? `Դիտիր ${config.ads} գովազդ՝ ${config.prize.toLocaleString()} ֏ ստանալու համար: (Մնաց՝ ${remainingAds})` : "Պարգևը պատրաստ է:")
                    : (state.lang === 'ru' ? (remainingAds > 0 ? `Посмотри ${config.ads} рекламы для ${config.prize.toLocaleString()} ֏: (Осталось: ${remainingAds})` : "Награда готова!") 
                    : (remainingAds > 0 ? `Watch ${config.ads} ads to get ${config.prize.toLocaleString()} ֏: (Left: ${remainingAds})` : "Reward ready!"));
                
                let btnTxt = remainingAds > 0 ? `${t.watch} (${state.dailyAdDone}/${config.ads})` : t.get;

                showModal(
                    title, desc, btnTxt,
                    function() {
                        if (remainingAds > 0) {
                            playDirectAd(() => { state.dailyAdDone++; save(); checkDailyBonus(); });
                        } else {
                            state.bal += config.prize; state.lastDaily = Date.now(); state.dailyAdDone = 0;
                            state.streak = state.streak >= 7 ? 1 : state.streak + 1; save(); update();
                            document.getElementById('modal-overlay').classList.remove('show');
                        }
                    }
                );
            }
        }

        window.handleTaskAd = function(type) {
            playDirectAd(() => {
                if(typeof state.adCounts[type] === 'undefined') state.adCounts[type] = 0;
                state.adCounts[type]++;
                
                if (state.adCounts[type] >= AD_REQS[type]) {
                    if(type === 'r1k') state.bal += 1000;
                    if(type === 'r5k') state.bal += 5000;
                    if(type === 'mystery') state.bal += Math.floor(Math.random()*60000)+20000;
                    if(type === 'doubleBal') state.bal *= 2;
                    
                    if(type === 'x2c') { 
                        state.clickMult = 2; 
                        state.multExpiry = Date.now() + (5 * 60 * 1000); 
                    }
                    if(type === 'x3c') { 
                        state.clickMult = 3; 
                        state.multExpiry = Date.now() + (5 * 60 * 1000); 
                    }
                    
                    state.adCounts[type] = 0;
                }
                updateTasksUI(); update(); save();
            });
        };

        window.nav = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id === 'shop') setTab('house');
        };

        window.setTab = function(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            let c = document.getElementById('list-container'); c.innerHTML = '';
            let langDb = db[t];
            langDb.forEach((item, index) => {
                let bought = state.owned[t].includes(index);
                let btnText = bought ? dict[state.lang].btnBought : dict[state.lang].btnBuy;
                let btnClass = bought ? "buy-btn bought" : "buy-btn";
                let disabled = bought ? "disabled" : (state.bal < item.p ? "disabled" : "");
                
                c.innerHTML += `<div class="card"><div class="card-info"><b>${item.n[state.lang]}</b><span>${item.p.toLocaleString()} ֏ | +${item.i}/s</span></div>
                <button class="${btnClass}" ${disabled} onclick="buy('${t}', ${index})">${btnText}</button></div>`;
            });
        };

        window.buy = function(t, i) {
            let item = db[t][i];
            if(state.bal >= item.p && !state.owned[t].includes(i)) {
                state.bal -= item.p; state.inc += item.i; state.owned[t].push(i);
                update(); setTab(t); save();
            }
        };

        window.subTg = function() { tg.openTelegramLink('https://t.me/drammasternews'); setTimeout(() => { if(!state.tgSub) { state.bal += 10000; state.tgSub = true; update(); save(); applyLang(); } }, 3000); };
        window.inviteFriend = function() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/DramMasterBot`); state.bal += 5000; update(); save(); };

        document.getElementById('coin').onpointerdown = function(e) {
            let currentMult = 1;
            if (state.multExpiry > Date.now()) {
                currentMult = state.clickMult || 1;
            } else {
                state.clickMult = 1;
            }

            let earn = Math.pow(2, state.lvl - 1) * currentMult;
            if(state.energy < earn) {
                showModal(dict[state.lang].errEng, dict[state.lang].errEngT, dict[state.lang].watch, () => { playDirectAd(() => { state.energy = state.maxE; document.getElementById('modal-overlay').classList.remove('show'); update(); }); });
                return;
            }
            state.energy -= earn; state.bal += earn;
            tg.HapticFeedback.impactOccurred('light');
            let cx = e.clientX || (e.touches && e.touches[0].clientX);
            let cy = e.clientY || (e.touches && e.touches[0].clientY);
            let f = document.createElement('div'); f.className = 'float-text'; f.innerText = '+' + earn;
            f.style.left = cx - 20 + 'px'; f.style.top = cy - 40 + 'px';
            document.body.appendChild(f); setTimeout(() => f.remove(), 700); update();
        };

        function save() { localStorage.setItem('DramMaster_SecureSave', JSON.stringify(state)); }
        function load() {
            try { let s = localStorage.getItem('DramMaster_SecureSave'); if(s) { state = { ...state, ...JSON.parse(s) }; } } catch(e) {}
            if(!state.lang) state.lang = 'en';
            if(!state.adCounts) state.adCounts = { r1k:0, r5k:0, mystery:0, doubleBal:0, x2c:0, x3c:0 };
            if(!state.clickMult) state.clickMult = 1;
            if(!state.multExpiry) state.multExpiry = 0;
            applyLang(); update(); setTimeout(checkDailyBonus, 1000);
        }

        setInterval(() => { 
            state.bal += state.inc; 
            if(state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + (state.maxE/3600)); 
            update();
            updateTasksUI();
        }, 1000);
        setInterval(save, 5000); load();
    </script>
</body>
</html>

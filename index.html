<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dram Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        :root { --gold: #FFD700; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; text-align: center; overflow: hidden; user-select: none; }
        
        /* Header */
        .header { padding: 15px; background: var(--card-bg); border-bottom: 2px solid var(--gold); border-radius: 0 0 25px 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .balance { font-size: 34px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .level-badge { font-size: 14px; background: var(--gold); color: black; padding: 3px 10px; border-radius: 10px; font-weight: bold; }
        
        /* Energy Bar */
        .energy-container { width: 85%; height: 20px; background: #333; margin: 15px auto; border-radius: 10px; position: relative; border: 1px solid #444; }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #00FF7F, #00D2FF); border-radius: 10px; transition: width 0.3s ease; }
        .energy-text { position: absolute; width: 100%; top: 0; font-size: 13px; line-height: 20px; font-weight: bold; }

        /* Main Game Area */
        .game-area { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .coin-btn { width: 230px; height: 230px; background: radial-gradient(circle, #ffe066, #b8860b); border-radius: 50%; border: 10px solid #8b6914; box-shadow: 0 0 50px rgba(184, 134, 11, 0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 100px; transition: transform 0.05s; }
        .coin-btn:active { transform: scale(0.92); }

        /* Shop & Tabs */
        .screen { display: none; padding: 20px; height: 80vh; overflow-y: auto; box-sizing: border-box; padding-bottom: 100px; }
        .screen.active { display: block; }
        .tab-content { display: flex; flex-direction: column; gap: 10px; }
        .shop-card { background: var(--card-bg); padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .shop-info b { color: var(--gold); font-size: 16px; }
        .shop-info small { color: #888; display: block; }
        .buy-btn { background: var(--gold); border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #444; color: #777; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #333; }
        .nav-item { color: #888; font-size: 12px; border: none; background: none; cursor: pointer; }
        .nav-item.active { color: var(--gold); font-weight: bold; }

        @keyframes floatText { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .floating-text { position: absolute; pointer-events: none; animation: floatText 0.8s ease-out forwards; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="level-badge" id="lvl-name">Լևլ 1: Սկսնակ</span>
        <div class="balance" id="balance">0 ֏</div>
        <div class="energy-container">
            <div class="energy-fill" id="energy-fill" style="width: 100%;"></div>
            <div class="energy-text" id="energy-text">⚡ 500 / 500</div>
        </div>
    </div>

    <div id="game-screen" class="screen active">
        <div class="game-area">
            <div class="coin-btn" id="coin" onclick="handleTap(event)">🪙</div>
            <p id="income-text" style="color: #00FF7F; margin-top: 15px;">Պասիվ շահույթ: 0 ֏/վրկ</p>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <button class="buy-btn" onclick="showSubShop('house')">🏠 Գույք</button>
            <button class="buy-btn" onclick="showSubShop('car')">🚗 Մեքենա</button>
            <button class="buy-btn" onclick="showSubShop('biz')">🏢 Բիզնես</button>
        </div>
        <div id="shop-items" class="tab-content"></div>
    </div>

    <div id="tasks-screen" class="screen">
        <h2 style="color: var(--gold);">📋 Առաջադրանքներ</h2>
        <div class="shop-card">
            <div class="shop-info"><b>Էներգիայի լիցքավորում</b><small>Դիտիր 2 գովազդ</small></div>
            <button class="buy-btn" onclick="watchAd('energy')">Դիտել</button>
        </div>
        <div class="shop-card">
            <div class="shop-info"><b>🔥 2X Շահույթ (5 րոպե)</b><small>Դիտիր 3 գովազդ</small></div>
            <button class="buy-btn" onclick="watchAd('2x')">Ակտիվացնել</button>
        </div>
        <div class="shop-card" id="x3-task">
            <div class="shop-info"><b>🚀 3X ՍՈՒՊԵՐ (5 րոպե)</b><small>Դիտիր 4 գովազդ (3 օրը մեկ)</small></div>
            <button class="buy-btn" onclick="watchAd('3x')">Ակտիվացնել</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="nav('game-screen', this)">🏠 Խաղալ</button>
        <button class="nav-item" onclick="nav('shop-screen', this)">🛒 Խանութ</button>
        <button class="nav-item" onclick="nav('tasks-screen', this)">⚡ Բոնուս</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ADSGRAM CONFIG - Ուղղված է
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "26025" }) : null;

        let state = {
            bal: 0, 
            inc: 0, 
            energy: 500, 
            click: 1, 
            lvl: 1,
            inventory: [],
            x2Until: 0,
            x3Until: 0,
            x3Next: 0,
            adCount: { energy: 0, x2: 0, x3: 0 }
        };

        const levels = [
            { l: 1, name: "Սկսնակ", min: 0, maxE: 500 },
            { l: 2, name: "Փորձնակ", min: 2000, maxE: 1000 },
            { l: 3, name: "Աշակերտ", min: 5000, maxE: 1500 },
            { l: 4, name: "Աշխատավոր", min: 10000, maxE: 2000 },
            { l: 5, name: "Խանութպան", min: 25000, maxE: 2500 },
            { l: 6, name: "Վաճառական", min: 50000, maxE: 3000 },
            { l: 7, name: "Առաջնորդ", min: 100000, maxE: 3500 },
            { l: 8, name: "Մենեջեր", min: 250000, maxE: 4000 },
            { l: 9, name: "Ներդրող", min: 500000, maxE: 4500 },
            { l: 10, name: "Միլիոնատեր", min: 1000000, maxE: 5000 },
            { l: 11, name: "Բիզնեսմեն", min: 2000000, maxE: 5500 },
            { l: 12, name: "Օլիգարխ", min: 5000000, maxE: 6000 }
        ];

        // 45 ԻՐԵՐԻ ՑՈՒՑԱԿ (15-ական)
        const items = {
            house: [
                { id: 'h1', n: 'Հին սենյակ', p: 500, inc: 1 },
                { id: 'h2', n: 'Վարձով բնակարան', p: 2000, inc: 5 },
                { id: 'h3', n: 'Գյուղական տուն', p: 10000, inc: 25 },
                { id: 'h4', n: 'Նորակառույց բնակարան', p: 25000, inc: 60 },
                { id: 'h5', n: 'Դուպլեքս Կենտրոնում', p: 75000, inc: 150 },
                { id: 'h6', n: 'Առանձնատուն Դիլիջանում', p: 150000, inc: 350 },
                { id: 'h7', n: 'Modern Villa', p: 300000, inc: 700 },
                { id: 'h8', n: 'Smart Home', p: 600000, inc: 1500 },
                { id: 'h9', n: 'Oceanfront Villa', p: 1200000, inc: 3000 },
                { id: 'h10', n: 'Պենտհաուս Դուբայում', p: 2500000, inc: 6500 },
                { id: 'h11', n: 'Սեփական Ամրոց', p: 5000000, inc: 14000 },
                { id: 'h12', n: 'Փոքր Կղզի', p: 10000000, inc: 30000 },
                { id: 'h13', n: 'Անձնական Բլուր', p: 25000000, inc: 75000 },
                { id: 'h14', n: 'Թագավորական Պալատ', p: 50000000, inc: 160000 },
                { id: 'h15', n: 'Մարսի Բազա', p: 100000000, inc: 400000 }
            ],
            car: [
                { id: 'c1', n: 'Հեծանիվ', p: 200, inc: 0.5 },
                { id: 'c2', n: 'VAZ 2107', p: 1500, inc: 4 },
                { id: 'c3', n: 'Opel Astra', p: 5000, inc: 12 },
                { id: 'c4', n: 'Toyota Camry', p: 20000, inc: 50 },
                { id: 'c5', n: 'Mercedes C-Class', p: 50000, inc: 120 },
                { id: 'c6', n: 'Tesla Model 3', p: 120000, inc: 300 },
                { id: 'c7', n: 'BMW M5', p: 250000, inc: 650 },
                { id: 'c8', n: 'Porsche 911', p: 500000, inc: 1400 },
                { id: 'c9', n: 'Lamborghini Aventador', p: 1000000, inc: 2800 },
                { id: 'c10', n: 'Rolls Royce Cullinan', p: 2000000, inc: 6000 },
                { id: 'c11', n: 'Ferrari SF90', p: 4000000, inc: 13000 },
                { id: 'c12', n: 'Bugatti Chiron', p: 8000000, inc: 28000 },
                { id: 'c13', n: 'Անձնական Ուղղաթիռ', p: 15000000, inc: 55000 },
                { id: 'c14', n: 'Private Jet', p: 40000000, inc: 150000 },
                { id: 'c15', n: 'Տիեզերանավ', p: 100000000, inc: 450000 }
            ],
            biz: [
                { id: 'b1', n: 'Կրպակ', p: 1000, inc: 3 },
                { id: 'b2', n: 'Ավտոլվացման կետ', p: 4000, inc: 10 },
                { id: 'b3', n: 'Սրճարան', p: 12000, inc: 35 },
                { id: 'b4', n: 'Գեղեցկության սրահ', p: 35000, inc: 90 },
                { id: 'b5', n: 'Ֆիթնես ակումբ', p: 80000, inc: 220 },
                { id: 'b6', n: 'Ավտոսերվիս', p: 180000, inc: 500 },
                { id: 'b7', n: 'Ռեստորանային ցանց', p: 400000, inc: 1200 },
                { id: 'b8', n: 'Շինարարական ընկերություն', p: 900000, inc: 2800 },
                { id: 'b9', n: 'IT Ստարտափ', p: 2000000, inc: 6500 },
                { id: 'b10', n: 'Բանկ', p: 5000000, inc: 17000 },
                { id: 'b11', n: 'Նավթային հորատանցք', p: 12000000, inc: 45000 },
                { id: 'b12', n: 'Ավիաընկերություն', p: 30000000, inc: 120000 },
                { id: 'b13', n: 'AI Կորպորացիա', p: 70000000, inc: 300000 },
                { id: 'b14', n: 'Էներգոցանց', p: 150000000, inc: 700000 },
                { id: 'b15', n: 'Գլոբալ Իմպերիա', p: 500000000, inc: 2500000 }
            ]
        };

        function updateUI() {
            const now = Date.now();
            let currentLvl = levels.findLast(l => state.bal >= l.min) || levels[0];
            state.lvl = currentLvl.l;
            
            document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString() + ' ֏';
            document.getElementById('lvl-name').innerText = `Լևլ ${currentLvl.l}: ${currentLvl.name}`;
            document.getElementById('income-text').innerText = `Պասիվ շահույթ: ${state.inc.toLocaleString()} ֏/վրկ`;
            
            // Energy
            let ePercent = (state.energy / currentLvl.maxE) * 100;
            document.getElementById('energy-fill').style.width = ePercent + '%';
            document.getElementById('energy-text').innerText = `⚡ ${Math.floor(state.energy)} / ${currentLvl.maxE}`;
        }

        function handleTap(e) {
            if (state.energy < 1) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            state.energy -= 1;
            let mult = 1;
            if (Date.now() < state.x3Until) mult = 3;
            else if (Date.now() < state.x2Until) mult = 2;
            
            let amount = state.click * mult;
            state.bal += amount;
            
            showFloatingText(e.clientX, e.clientY, `+${amount}`, mult);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function showFloatingText(x, y, text, mult) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = mult === 3 ? '#FF4500' : (mult === 2 ? '#00FF7F' : '#FFD700');
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function showSubShop(type) {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            items[type].forEach(item => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.innerHTML = `
                    <div class="shop-info">
                        <b>${item.n}</b>
                        <small>Գին: ${item.p.toLocaleString()} ֏ | +${item.inc}/վրկ</small>
                    </div>
                    <button class="buy-btn" onclick="buyItem('${type}', '${item.id}')" ${state.bal < item.p ? 'disabled' : ''}>Գնել</button>
                `;
                container.appendChild(card);
            });
        }

        function buyItem(type, id) {
            const item = items[type].find(i => i.id === id);
            if (state.bal >= item.p) {
                state.bal -= item.p;
                state.inc += item.inc;
                state.click += Math.ceil(item.inc * 0.1);
                tg.HapticFeedback.notificationOccurred('success');
                showSubShop(type);
                updateUI();
                save();
            }
        }

        async function watchAd(type) {
            if (!AdController) {
                alert("Գովազդը բեռնված չէ: Ստուգեք ինտերնետը կամ անջատեք AdBlock-ը:");
                return;
            }

            try {
                await AdController.show();
                state.adCount[type]++;
                
                if (type === 'energy' && state.adCount.energy >= 2) {
                    let maxE = levels.find(l => l.l === state.lvl).maxE;
                    state.energy = maxE;
                    state.adCount.energy = 0;
                    alert("⚡ Էներգիան լցված է!");
                } else if (type === '2x' && state.adCount.x2 >= 3) {
                    state.x2Until = Date.now() + (5 * 60 * 1000);
                    state.adCount.x2 = 0;
                    alert("🔥 2X Բոնուսը միացված է 5 րոպեով!");
                } else if (type === '3x' && state.adCount.x3 >= 4) {
                    state.x3Until = Date.now() + (5 * 60 * 1000);
                    state.x3Next = Date.now() + (3 * 24 * 60 * 60 * 1000);
                    state.adCount.x3 = 0;
                    alert("🚀 3X ՍՈՒՊԵՐ Բոնուսը միացված է!");
                }
                save();
                updateUI();
            } catch (e) {
                alert("Գովազդը փակվել է կամ սխալ է տեղի ունեցել:");
            }
        }

        function nav(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // Պասիվ շահույթ և Էներգիա
        setInterval(() => {
            state.bal += (state.inc / 10);
            let maxE = levels.find(l => l.l === state.lvl).maxE;
            if (state.energy < maxE) {
                state.energy = Math.min(maxE, state.energy + (maxE / 1000));
            }
            updateUI();
        }, 100);

        function save() { localStorage.setItem('dramMasterState', JSON.stringify(state)); }
        function load() {
            const saved = localStorage.getItem('dramMasterState');
            if (saved) state = JSON.parse(saved);
            updateUI();
        }

        load();
    </script>
</body>
</html>
